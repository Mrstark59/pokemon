const shuffle=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};
const rng=n=>0|Math.random()*n;
const cl=o=>JSON.parse(JSON.stringify(o));
const calcStat=(b,hp,lv)=>lv===undefined?calcStat(b,hp,50):hp?(0|(2*b+31)*lv/100)+lv+10:(0|(2*b+31)*lv/100)+5;
const bMul=b=>b>=0?(2+b)/2:2/(2-b);

function effStat(pk,stat){
  const b=pk.baseStats;
  const base={attack:b.attack,defense:b.defense,specialAttack:b.specialAttack,specialDefense:b.specialDefense,speed:b.speed}[stat];
  let v=0|calcStat(base,false,pk.level)*bMul(pk.boosts[stat]||0);
  if(stat==="attack"&&pk.status==="brn")v=0|v*.5;
  if(stat==="speed"&&pk.status==="par")v=0|v*.5;
  if(stat==="attack"&&pk.held==="choice-band")v=0|v*1.5;
  if(stat==="specialAttack"&&pk.held==="choice-specs")v=0|v*1.5;
  return Math.max(1,v);
}
function calcDmg(atk,mv,def){
  if(!mv.p)return{d:0,eff:1,crit:false};
  const eff=typeEff(mv.t,def.types);
  if(eff===0)return{d:0,eff:0,crit:false};
  const phy=mv.dc==="phy";
  const a=effStat(atk,phy?"attack":"specialAttack"),d=effStat(def,phy?"defense":"specialDefense");
  let dm=(0|(0|(2*50/5+2)*mv.p*a/d)/50)+2;
  if(atk.types.includes(mv.t))dm=0|dm*1.5;
  dm=0|dm*eff;
  if(atk.held==="life-orb")dm=0|dm*1.3;
  const crit=Math.random()<(mv.crit?1/8:1/24);
  if(crit)dm=0|dm*1.5;
  return{d:Math.max(1,0|dm*((rng(16)+85)/100)),eff,crit};
}
function pickMove(en,pl){
  const v=en.moves.filter(m=>m.pp>0);
  if(!v.length)return{name:"struggle",p:50,t:"normal",dc:"phy",a:100,pp:1,maxPp:1,rcl:.25};
  const s=v.map(m=>({m,s:m.p?(m.p*typeEff(m.t,pl.types)*(en.types.includes(m.t)?1.5:1)):((m.sta&&!pl.status)?40:3)}));
  s.sort((a,b)=>b.s-a.s);
  return Math.random()<.8?s[0].m:v[rng(v.length)];
}
async function fetchPoke(id,level){
  level=level||50;
  const r=await fetch("https://pokeapi.co/api/v2/pokemon/"+id);
  const d=await r.json();
  const types=d.types.map(t=>t.type.name);
  const bs={hp:d.stats[0].base_stat,attack:d.stats[1].base_stat,defense:d.stats[2].base_stat,
    specialAttack:d.stats[3].base_stat,specialDefense:d.stats[4].base_stat,speed:d.stats[5].base_stat};
  const learned=new Set(d.moves.map(m=>m.move.name));
  const matched=Object.entries(MOVES).filter(([n])=>learned.has(n)).map(([name,def])=>({name,...def,pp:def.pp,maxPp:def.pp}));
  const stab=shuffle(matched.filter(m=>m.p>0&&types.includes(m.t)));
  const other=shuffle(matched.filter(m=>m.p>0&&!types.includes(m.t)));
  const sta=shuffle(matched.filter(m=>!m.p));
  let sel=[...stab.slice(0,2),...other.slice(0,1),...sta.slice(0,1)];
  const used=new Set(sel.map(m=>m.name));
  [...stab,...other].filter(m=>!used.has(m.name)).forEach(m=>{if(sel.length<4)sel.push(m);});
  if(!sel.length)sel.push({name:"tackle",...MOVES.tackle,pp:35,maxPp:35});
  const artwork=(d.sprites.other&&d.sprites.other["official-artwork"])?d.sprites.other["official-artwork"].front_default:d.sprites.front_default;
  return{id:d.id,name:d.name,sprite:d.sprites.front_default,artwork:artwork||d.sprites.front_default,
    types,baseStats:bs,maxHp:calcStat(bs.hp,true,level),hp:calcStat(bs.hp,true,level),
    moves:sel.slice(0,4),status:null,statusCnt:0,held:null,sashUsed:false,
    boosts:{attack:0,defense:0,specialAttack:0,specialDefense:0,speed:0},level:level,fainted:false};
}

function runStatus(pk,isEnemy){
  const n=isEnemy?pk.name:"Your "+pk.name;
  if(!pk.status)return{ok:true,logs:[]};
  if(pk.status==="slp"){
    if(pk.statusCnt<=0){pk.status=null;return{ok:true,logs:[n+" woke up!"]};}
    pk.statusCnt--;return{ok:false,logs:[n+" is fast asleep!"]};
  }
  if(pk.status==="frz"){
    if(Math.random()<.2){pk.status=null;return{ok:true,logs:[n+" thawed out!"]};}
    return{ok:false,logs:[n+" is frozen solid!"]};
  }
  if(pk.status==="par"&&Math.random()<.25)return{ok:false,logs:[n+" is paralyzed!"]};
  return{ok:true,logs:[]};
}
function runEOT(pk,isEnemy){
  const n=isEnemy?pk.name:"Your "+pk.name,logs=[];
  if(pk.hp<=0)return logs;
  if(pk.status==="brn"){const d=0|pk.maxHp/8;pk.hp=Math.max(0,pk.hp-d);logs.push(n+" is hurt by burn! (−"+d+")");}
  else if(pk.status==="psn"){const d=0|pk.maxHp/8;pk.hp=Math.max(0,pk.hp-d);logs.push(n+" is hurt by poison! (−"+d+")");}
  else if(pk.status==="bpsn"){pk.statusCnt=(pk.statusCnt||1)+1;const d=0|pk.maxHp*pk.statusCnt/16;pk.hp=Math.max(0,pk.hp-d);logs.push(n+" is badly poisoned! (−"+d+")");}
  if(pk.held==="leftovers"&&pk.hp>0){const h=0|pk.maxHp/16;pk.hp=Math.min(pk.maxHp,pk.hp+h);logs.push(n+" recovered HP! (+"+h+")");}
  if(pk.held==="sitrus-berry"&&pk.hp>0&&pk.hp<=pk.maxHp*.5){const h=0|pk.maxHp*.25;pk.hp=Math.min(pk.maxHp,pk.hp+h);pk.held=null;logs.push(n+"'s Sitrus Berry activated! (+"+h+")");}
  return logs;
}
function runMove(atk,def,mv,atkIsEnemy){
  const n=atkIsEnemy?atk.name:"Your "+atk.name,t=atkIsEnemy?"Your "+def.name:def.name;
  const logs=[n+" used "+mv.name.replace(/-/g," ")+"!"];
  if(mv.a!==999&&Math.random()*100>mv.a){if(mv.pp!==undefined)mv.pp=Math.max(0,mv.pp-1);logs.push("But it missed!");return logs;}
  if(mv.pp!==undefined)mv.pp=Math.max(0,mv.pp-1);
  if(mv.dc==="sta"){
    if(mv.sta){
      if(def.status){logs.push(t+" already has a status!");}
      else{
        const imm=(mv.sta==="par"&&def.types.includes("electric"))||(mv.sta==="psn"&&(def.types.includes("poison")||def.types.includes("steel")))||(mv.sta==="brn"&&def.types.includes("fire"));
        if(imm){logs.push("It doesn't affect "+t+"!");}
        else{
          def.status=mv.sta;def.statusCnt=(mv.sta==="slp")?1+rng(3):0;
          if(def.held==="lum-berry"){def.status=null;def.held=null;logs.push(t+"'s Lum Berry cured it!");}
          else{const lb={brn:"burned",par:"paralyzed",psn:"poisoned",bpsn:"badly poisoned",slp:"fell asleep",frz:"was frozen"};logs.push(t+" "+(lb[mv.sta]||mv.sta)+"!");}
        }
      }
    }
    return logs;
  }
  const res=calcDmg(atk,mv,def);
  if(res.crit)logs.push("A critical hit!");
  if(res.eff===0){logs.push("No effect!");return logs;}
  if(res.eff>=4)logs.push("Super effective!! (4x)");else if(res.eff>=2)logs.push("Super effective!");else if(res.eff<1)logs.push("Not very effective...");
  if(def.held==="focus-sash"&&!def.sashUsed&&def.hp===def.maxHp&&res.d>=def.hp){def.hp=1;def.sashUsed=true;logs.push(t+" hung on with Focus Sash!");}
  else{def.hp=Math.max(0,def.hp-res.d);logs.push(t+" took "+res.d+" damage!");}
  if(mv.eff&&mv.ec&&Math.random()*100<mv.ec&&!def.status){
    const imm=(mv.eff==="par"&&def.types.includes("electric"))||(mv.eff==="psn"&&(def.types.includes("poison")||def.types.includes("steel")))||(mv.eff==="brn"&&def.types.includes("fire"));
    if(!imm){def.status=mv.eff;if(mv.eff==="slp")def.statusCnt=1+rng(3);
      if(def.held==="lum-berry"){def.status=null;def.held=null;logs.push(t+"'s Lum Berry cured it!");}
      else{const lb={brn:"burned",par:"paralyzed",psn:"poisoned",frz:"frozen"};if(lb[mv.eff])logs.push(t+" was "+lb[mv.eff]+"!");}}
  }
  if(mv.rcl&&atk.hp>0){const r=Math.max(1,0|res.d*mv.rcl);atk.hp=Math.max(0,atk.hp-r);logs.push(n+" took "+r+" recoil!");}
  if(atk.held==="life-orb"&&atk.hp>0){const r=Math.max(1,0|atk.maxHp*.1);atk.hp=Math.max(0,atk.hp-r);logs.push("Life Orb recoil! (−"+r+")");}
  return logs;
}
function resolveTurn(player,enemy,mi){
  const p=cl(player),e=cl(enemy),logs=[];
  const pm=p.moves[mi],em=pickMove(e,p);
  const pS=effStat(p,"speed"),eS=effStat(e,"speed");
  const pPri=pm&&pm.pri||0,ePri=em.pri||0;
  const pFirst=pPri>ePri||(pPri===ePri&&(pS>eS||(pS===eS&&Math.random()<.5)));
  function go(a1,d1,mv1,a1e,a2,d2,mv2,a2e){
    const r1=runStatus(a1,a1e);logs.push(...r1.logs);
    if(r1.ok)logs.push(...runMove(a1,d1,mv1,a1e));
    if(d1.hp<=0)return true;
    const r2=runStatus(a2,a2e);logs.push(...r2.logs);
    if(r2.ok)logs.push(...runMove(a2,d2,mv2,a2e));
    return false;
  }
  const early=pFirst?go(p,e,pm,false,e,p,em,true):go(e,p,em,true,p,e,pm,false);
  if(!early){logs.push(...runEOT(p,false));logs.push(...runEOT(e,true));}
  if(p.hp<=0){p.hp=0;p.fainted=true;logs.push("Your "+p.name+" fainted!");}
  if(e.hp<=0){e.hp=0;logs.push(e.name+" fainted!");}
  return{logs,p,e,pFainted:p.fainted,eFainted:e.hp<=0};
}

function HPBar(props){
  const pct=props.max>0?Math.max(0,props.cur/props.max*100):0;
  const col=pct>50?"#4ade80":pct>20?"#facc15":"#f87171";
  return React.createElement("div",{style:{background:"#1a1a30",borderRadius:6,overflow:"hidden",height:props.lg?14:10,border:"1px solid #2d2d50"}},
    React.createElement("div",{style:{width:pct+"%",height:"100%",background:col,transition:"width .4s, background-color .4s"}}));
}
function TBadge(props){
  return React.createElement("span",{style:{background:TC2[props.type]||"#777",color:"#fff",fontSize:10,fontWeight:700,padding:"2px 8px",borderRadius:12,textTransform:"uppercase",letterSpacing:.5}},props.type);
}
function SBadge(props){
  if(!props.status)return null;
  const m={brn:{c:"#e17055",l:"BRN"},par:{c:"#fdcb6e",l:"PAR"},psn:{c:"#a29bfe",l:"PSN"},bpsn:{c:"#6c5ce7",l:"PSN!"},slp:{c:"#74b9ff",l:"SLP"},frz:{c:"#00cec9",l:"FRZ"}};
  const dk=m[props.status];if(!dk)return null;
  return React.createElement("span",{style:{background:dk.c,color:"#fff",fontSize:9,fontWeight:800,padding:"2px 6px",borderRadius:10}},dk.l);
}

                  <div style={{fontSize:12,fontWeight:700,marginBottom:6,color:"#c0c0e0"}}>{item.emoji} {item.name} x{count} <span style={{fontWeight:400,color:"#555",fontSize:11}}>— {item.desc}</span></div>
                  {item.revive?team.filter(p=>p.fainted).map(p=>{const ti=team.findIndex(t=>t.id===p.id);return(
                    <button key={ti} onClick={()=>onUseItem(item,ti)} style={{...BTN("#a29bfe"),display:"block",width:"100%",marginBottom:4,textTransform:"capitalize",textAlign:"left",padding:"7px 12px"}}>Use on {p.name} (fainted)</button>
                  );}):!item.held?team.filter(p=>!p.fainted).map(p=>{const ti=team.findIndex(t=>t.id===p.id);return(
                    <button key={ti} onClick={()=>onUseItem(item,ti)} style={{...BTN("#74b9ff"),display:"block",width:"100%",marginBottom:4,textTransform:"capitalize",textAlign:"left",padding:"7px 12px"}}>Use on {p.name}</button>
                  );}):team.filter(p=>!p.fainted&&!p.held).map(p=>{const ti=team.findIndex(t=>t.id===p.id);return(
                    <button key={ti} onClick={()=>onUseItem(item,ti)} style={{...BTN("#55efc4"),display:"block",width:"100%",marginBottom:4,textTransform:"capitalize",textAlign:"left",padding:"7px 12px"}}>Give to {p.name}</button>
                  );})}
                </div>
              ))}
            </div>
          )}
          {showSwitch&&(
            <div style={CARD}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
                <span style={{fontWeight:800}}>{needSwitch?"😵 Choose next Pokémon":"🔄 Switch Pokémon"}</span>
                {!needSwitch&&<button onClick={()=>setShowSwitch(false)} style={{background:"none",border:"none",color:"#666",fontSize:18,cursor:"pointer"}}>✕</button>}
              </div>
              {team.map((p,i)=>(
                <button key={i} onClick={()=>!p.fainted&&i!==activeIdx&&onSwitch(i)} disabled={p.fainted||i===activeIdx}
                  style={{display:"flex",alignItems:"center",gap:10,width:"100%",padding:"8px 10px",marginBottom:6,background:i===activeIdx?"#2a2a44":p.fainted?"#111":"#1a2a3a",border:"1px solid "+(i===activeIdx?"#a78bfa":p.fainted?"#222":"#3d6d9a"),borderRadius:10,color:p.fainted?"#333":"#fff",cursor:p.fainted||i===activeIdx?"not-allowed":"pointer",opacity:p.fainted?.35:1}}>
                  <img src={p.sprite} alt={p.name} style={{width:36,height:36,imageRendering:"pixelated"}}/>
                  <div style={{flex:1,textAlign:"left"}}>
                    <div style={{textTransform:"capitalize",fontWeight:700,fontSize:13}}>{p.name}</div>
                    <div style={{fontSize:10,color:"#666"}}>{p.hp}/{p.maxHp} HP {p.fainted?"(Fainted)":i===activeIdx?"(Active)":""}</div>
                  </div>
                  <div style={{width:70}}><HPBar cur={p.hp} max={p.maxHp}/></div>
                </button>
              ))}
            </div>
          )}
        </div>
      </div>
    );
  }

  if(screen==="gameover")return(
    <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"system-ui,sans-serif",color:"#e0e0f0"}}>
      <div style={{...CARD,maxWidth:400,textAlign:"center"}}>
        <div style={{fontSize:60,marginBottom:10}}>💀</div>
        <div style={{fontSize:22,fontWeight:900,color:"#f87171",marginBottom:6}}>GAME OVER</div>
        <div style={{color:"#555",marginBottom:18}}>You reached Arena {arena}</div>
        <div style={{marginBottom:20,textAlign:"left"}}>
          {team.map((p,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",borderBottom:"1px solid #1a1a3a"}}>
              <img src={p.sprite} alt={p.name} style={{width:36,height:36,imageRendering:"pixelated",opacity:p.fainted?.3:1}}/>
              <span style={{textTransform:"capitalize",color:p.fainted?"#444":"#fff",flex:1}}>{p.name}</span>
              {p.fainted?<span style={{color:"#f87171",fontSize:11}}>fainted</span>:<span style={{color:"#4ade80",fontSize:11}}>{p.hp}/{p.maxHp} HP</span>}
            </div>
          ))}
        </div>
        <button onClick={()=>window.location.reload()} style={{...BTN("#f87171"),padding:"12px 32px",fontSize:15}}>🔄 Play Again</button>
      </div>
    </div>
  );

  if(screen==="victory")return(
    <div style={{minHeight:"100vh",background:BG,display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"system-ui,sans-serif",color:"#e0e0f0"}}>
      <div style={{...CARD,maxWidth:400,textAlign:"center"}}>
        <div style={{fontSize:60,marginBottom:10}}>🏆</div>
        <div style={{fontSize:20,fontWeight:900,color:"#ffd700",marginBottom:6}}>CHAMPION!</div>
        <div style={{color:"#888",marginBottom:20}}>You conquered all 20 Arenas!</div>
        <div style={{marginBottom:20,textAlign:"left"}}>
          {team.map((p,i)=>(
            <div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"5px 0",borderBottom:"1px solid #1a1a3a"}}>
              <img src={p.sprite} alt={p.name} style={{width:36,height:36,imageRendering:"pixelated"}}/>
              <span style={{textTransform:"capitalize",flex:1}}>{p.name}</span>
              {p.held&&<span style={{fontSize:11,color:"#a78bfa"}}>📦 {p.held}</span>}
            </div>
          ))}
        </div>
        <button onClick={()=>window.location.reload()} style={{...BTN("#ffd700"),padding:"12px 32px",fontSize:15}}>🔄 Play Again</button>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
