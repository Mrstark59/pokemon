const mélange=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};
const alea=n=>0|Math.random()*n;
const cop=o=>JSON.parse(JSON.stringify(o));
const calcStat=(b,pv,lv)=>pv?(0|(2*b+31)*lv/100)+lv+10:(0|(2*b+31)*lv/100)+5;
const bMul=b=>b>=0?(2+b)/2:2/(2-b);

function statEff(pk,stat){
  const b=pk.stats,base={attack:b.attack,defense:b.defense,specialAttack:b.specialAttack,specialDefense:b.specialDefense,speed:b.speed}[stat];
  let v=0|calcStat(base,false,pk.lv)*bMul(pk.boost[stat]||0);
  if(stat==="attack"&&pk.status==="brn")v=0|v*.5;
  if(stat==="speed"&&pk.status==="par")v=0|v*.5;
  if(stat==="attack"&&pk.tenu==="choice-band")v=0|v*1.5;
  if(stat==="specialAttack"&&pk.tenu==="choice-specs")v=0|v*1.5;
  if(stat==="speed"&&pk.tenu==="choice-scarf")v=0|v*1.5;
  if(stat==="specialDefense"&&pk.tenu==="assault-vest")v=0|v*1.5;
  return Math.max(1,v);
}

function calcDmg(atk,mv,def){
  if(!mv.p)return{d:0,eff:1,crit:false};
  const eff=typeEff(mv.t,def.types);if(eff===0)return{d:0,eff:0,crit:false};
  /* Air Balloon immunise contre Sol */
  if(mv.t==="ground"&&def.tenu==="air-balloon")return{d:0,eff:0,crit:false,balloon:true};
  const phy=mv.dc==="phy",a=statEff(atk,phy?"attack":"specialAttack"),d=statEff(def,phy?"defense":"specialDefense");
  let dm=(0|(0|(2*50/5+2)*mv.p*a/d)/50)+2;
  if(atk.types.includes(mv.t))dm=0|dm*1.5;dm=0|dm*eff;
  if(atk.tenu==="life-orb")dm=0|dm*1.3;
  if(atk.tenu==="expert-belt"&&eff>1)dm=0|dm*1.2;
  if(phy&&atk.tenu==="muscle-band")dm=0|dm*1.1;
  if(!phy&&atk.tenu==="wise-glasses")dm=0|dm*1.1;
  const tauxCrit=mv.crit?1/4:(atk.tenu==="scope-lens"?1/8:1/24);
  const crit=Math.random()<tauxCrit;if(crit)dm=0|dm*1.5;
  return{d:Math.max(1,0|dm*((alea(16)+85)/100)),eff,crit};
}

function choisirCapIA(enn,jou){
  const v=enn.caps.filter(c=>c.pp>0);
  if(!v.length)return{nom:"Lutte",p:50,t:"normal",dc:"phy",a:100,pp:1,maxPp:1,rcl:.25};
  const s=v.map(c=>({c,s:c.p?(c.p*typeEff(c.t,jou.types)*(enn.types.includes(c.t)?1.5:1)):((c.sta&&!jou.status)?40:3)}));
  s.sort((a,b)=>b.s-a.s);return Math.random()<.8?s[0].c:v[alea(v.length)];
}

async function chargerPoke(id){
  const r=await fetch("https://pokeapi.co/api/v2/pokemon/"+id);const d=await r.json();
  const types=d.types.map(t=>t.type.name);
  const st={hp:d.stats[0].base_stat,attack:d.stats[1].base_stat,defense:d.stats[2].base_stat,
    specialAttack:d.stats[3].base_stat,specialDefense:d.stats[4].base_stat,speed:d.stats[5].base_stat};
  const appris=new Set(d.moves.map(m=>m.move.name));
  const matches=Object.entries(CAP).filter(([n])=>appris.has(n)).map(([nom,def])=>({nom,...def,pp:def.pp,maxPp:def.pp}));
  const stab=mélange(matches.filter(m=>m.p>0&&types.includes(m.t)));
  const autre=mélange(matches.filter(m=>m.p>0&&!types.includes(m.t)));
  const sta=mélange(matches.filter(m=>!m.p));
  let sel=[...stab.slice(0,2),...autre.slice(0,1),...sta.slice(0,1)];
  const us=new Set(sel.map(m=>m.nom));
  [...stab,...autre].filter(m=>!us.has(m.nom)).forEach(m=>{if(sel.length<4)sel.push(m);});
  if(!sel.length)sel.push({nom:"tackle",...CAP.tackle,pp:35,maxPp:35});
  const art=d.sprites.other?.["official-artwork"]?.front_default;
  return{id:d.id,nom:d.name,sprite:d.sprites.front_default,art:art||d.sprites.front_default,
    types,stats:st,caps:sel.slice(0,4),boost:{attack:0,defense:0,specialAttack:0,specialDefense:0,speed:0},
    status:null,statusCnt:0,tenu:null,sashUsed:false,evanoui:false};
}

const STATUS_BAIE={"cheri-berry":"par","chesto-berry":"slp","pecha-berry":"psn","rawst-berry":"brn","aspear-berry":"frz"};
const BAIE_BOOST={"salac-berry":"speed","liechi-berry":"attack","petaya-berry":"specialAttack"};

function verifierStatut(pk,estEnnemi){
  const n=estEnnemi?pk.nom:"Votre "+pk.nom;
  if(!pk.status)return{ok:true,logs:[]};
  if(pk.status==="slp"){if(pk.statusCnt<=0){pk.status=null;return{ok:true,logs:[n+" se réveille!"]};}pk.statusCnt--;return{ok:false,logs:[n+" est en plein sommeil!"]};}
  if(pk.status==="frz"){if(Math.random()<.2){pk.status=null;return{ok:true,logs:[n+" se dégèle!"]};}return{ok:false,logs:[n+" est gelé!"]};}
  if(pk.status==="par"&&Math.random()<.25)return{ok:false,logs:[n+" est paralysé!"]};
  return{ok:true,logs:[]};
}

function finTour(pk,estEnnemi){
  const n=estEnnemi?pk.nom:"Votre "+pk.nom,logs=[];if(pk.pv<=0)return logs;
  if(pk.status==="brn"){const d=0|pk.pvMax/8;pk.pv=Math.max(0,pk.pv-d);logs.push(n+" souffre de sa brûlure! (−"+d+" PV)");}
  else if(pk.status==="psn"){const d=0|pk.pvMax/8;pk.pv=Math.max(0,pk.pv-d);logs.push(n+" souffre du poison! (−"+d+" PV)");}
  else if(pk.status==="bpsn"){pk.statusCnt=(pk.statusCnt||1)+1;const d=0|pk.pvMax*pk.statusCnt/16;pk.pv=Math.max(0,pk.pv-d);logs.push(n+" souffre du poison grave! (−"+d+" PV)");}
  if(pk.tenu==="leftovers"&&pk.pv>0){const h=0|pk.pvMax/16;pk.pv=Math.min(pk.pvMax,pk.pv+h);logs.push(n+" récupère grâce aux Restes! (+"+h+" PV)");}
  if(pk.tenu==="black-sludge"&&pk.pv>0){if(pk.types.includes("poison")){const h=0|pk.pvMax/16;pk.pv=Math.min(pk.pvMax,pk.pv+h);logs.push(n+" récupère grâce à la Gadoue Noire! (+"+h+" PV)");}else{const d=0|pk.pvMax/8;pk.pv=Math.max(0,pk.pv-d);logs.push(n+" est blessé par la Gadoue Noire! (−"+d+" PV)");}}
  if(pk.tenu==="sitrus-berry"&&pk.pv>0&&pk.pv<=pk.pvMax*.5){const h=0|pk.pvMax*.25;pk.pv=Math.min(pk.pvMax,pk.pv+h);pk.tenu=null;logs.push(n+" mange sa Baie Sitrus! (+"+h+" PV)");}
  /* Baies boost (sous 25% PV) */
  if(pk.pv>0&&pk.pv<=pk.pvMax*.25&&pk.tenu&&BAIE_BOOST[pk.tenu]){
    const stat=BAIE_BOOST[pk.tenu];pk.boost[stat]=(pk.boost[stat]||0)+1;
    const nm=pk.tenu.replace("-berry","");pk.tenu=null;logs.push(n+" mange sa Baie! "+stat+" augmente!");
  }
  return logs;
}

function executerCap(atk,def,mv,atkEstEnn){
  const n=atkEstEnn?atk.nom:"Votre "+atk.nom,t=atkEstEnn?"Votre "+def.nom:def.nom;
  const logs=[n+" utilise "+mv.nom.replace(/-/g," ")+"!"];
  if(mv.a!==999&&Math.random()*100>mv.a){if(mv.pp!==undefined)mv.pp=Math.max(0,mv.pp-1);logs.push("La capacité a échoué!");return logs;}
  if(mv.pp!==undefined)mv.pp=Math.max(0,mv.pp-1);
  /* Capacité de statut */
  if(mv.dc==="sta"){
    if(mv.sta){if(def.status){logs.push(t+" a déjà un problème de statut!");}
    else{const imm=(mv.sta==="par"&&def.types.includes("electric"))||(mv.sta==="psn"&&(def.types.includes("poison")||def.types.includes("steel")))||(mv.sta==="brn"&&def.types.includes("fire"));
      if(imm)logs.push("Ça n'affecte pas "+t+"!");
      else{def.status=mv.sta;def.statusCnt=mv.sta==="slp"?1+alea(3):0;
        const sb=Object.entries(STATUS_BAIE).find(([b,s])=>def.tenu===b&&s===def.status);
        if(sb){def.status=null;def.tenu=null;logs.push("La Baie de "+t+" soigne le statut!");}
        else{const lb={brn:"brûlé",par:"paralysé",psn:"empoisonné",bpsn:"gravement empoisonné",slp:"endormi",frz:"gelé"};logs.push(t+" est "+lb[mv.sta]+"!");}
      }
    }return logs;}
  }
  /* Attaque */
  const res=calcDmg(atk,mv,def);
  if(res.balloon){def.tenu=null;logs.push(t+" est immunisé (Ballon Air crève)!");return logs;}
  if(res.crit)logs.push("Coup critique!");
  if(res.eff===0){logs.push("Ça n'affecte pas "+t+"!");return logs;}
  if(res.eff>=4)logs.push("C'est super efficace!! (×4)");else if(res.eff>=2)logs.push("C'est super efficace!");else if(res.eff<1)logs.push("Ce n'est pas très efficace...");
  /* Focus Sash */
  if(def.tenu==="focus-sash"&&!def.sashUsed&&def.pv===def.pvMax&&res.d>=def.pv){def.pv=1;def.sashUsed=true;logs.push(t+" résiste grâce à la Ceinture Focus!");}
  else{def.pv=Math.max(0,def.pv-res.d);logs.push(t+" perd "+res.d+" PV!");}
  /* Air Balloon éclate si touché */
  if(def.tenu==="air-balloon"&&res.d>0)def.tenu=null;
  /* Effet secondaire statut */
  if(mv.eff&&mv.ec&&Math.random()*100<mv.ec&&!def.status){
    const imm=(mv.eff==="par"&&def.types.includes("electric"))||(mv.eff==="psn"&&(def.types.includes("poison")||def.types.includes("steel")))||(mv.eff==="brn"&&def.types.includes("fire"));
    if(!imm){def.status=mv.eff;if(mv.eff==="slp")def.statusCnt=1+alea(3);
      const sb=Object.entries(STATUS_BAIE).find(([b,s])=>def.tenu===b&&s===def.status);
      if(sb){def.status=null;def.tenu=null;logs.push("La Baie de "+t+" soigne le statut!");}
      else{const lb={brn:"brûlé",par:"paralysé",psn:"empoisonné",frz:"gelé"};if(lb[mv.eff])logs.push(t+" est "+lb[mv.eff]+"!");}
    }
  }
  /* Recul */
  if(mv.rcl&&atk.pv>0){const r=Math.max(1,0|res.d*mv.rcl);atk.pv=Math.max(0,atk.pv-r);logs.push(n+" subit "+r+" PV de recul!");}
  if(atk.tenu==="life-orb"&&atk.pv>0){const r=Math.max(1,0|atk.pvMax*.1);atk.pv=Math.max(0,atk.pv-r);logs.push("Recul de l'Orbe Vie! (−"+r+" PV)");}
  /* Rocky Helmet */
  if(def.tenu==="rocky-helmet"&&mv.dc==="phy"&&atk.pv>0){const r=Math.max(1,0|def.pvMax/6);atk.pv=Math.max(0,atk.pv-r);logs.push(n+" est blessé par le Casque Rocher! (−"+r+" PV)");}
  /* Shell Bell */
  if(atk.tenu==="shell-bell"&&res.d>0&&atk.pv>0){const h=Math.max(1,0|res.d/8);atk.pv=Math.min(atk.pvMax,atk.pv+h);logs.push(n+" récupère grâce à la Sonnaille! (+"+h+" PV)");}
  /* Baies statut activées au contact */
  const sb2=Object.entries(STATUS_BAIE).find(([b,s])=>def.tenu===b&&def.status===s);
  if(sb2){def.status=null;def.tenu=null;logs.push("La Baie de "+t+" soigne son statut!");}
  return logs;
}

function résoudreT(joueur,ennemi,mi){
  const j=cop(joueur),e=cop(ennemi),logs=[];
  const jm=j.caps[mi],em=choisirCapIA(e,j);
  const jVit=statEff(j,"speed"),eVit=statEff(e,"speed");
  const jPri=(jm&&jm.pri)||0,ePri=em.pri||0;
  /* Quick Claw */
  const jQuick=j.tenu==="quick-claw"&&Math.random()<.2;
  const eQuick=e.tenu==="quick-claw"&&Math.random()<.2;
  const jFirst=jQuick||((!eQuick)&&(jPri>ePri||(jPri===ePri&&(jVit>eVit||(jVit===eVit&&Math.random()<.5)))));
  function aller(a1,d1,mv1,a1e,a2,d2,mv2,a2e){
    const r1=verifierStatut(a1,a1e);logs.push(...r1.logs);if(r1.ok)logs.push(...executerCap(a1,d1,mv1,a1e));
    if(d1.pv<=0)return true;
    const r2=verifierStatut(a2,a2e);logs.push(...r2.logs);if(r2.ok)logs.push(...executerCap(a2,d2,mv2,a2e));
    return false;
  }
  const tôt=jFirst?aller(j,e,jm,false,e,j,em,true):aller(e,j,em,true,j,e,jm,false);
  if(!tôt){logs.push(...finTour(j,false));logs.push(...finTour(e,true));}
  if(j.pv<=0){j.pv=0;j.evanoui=true;logs.push("Votre "+j.nom+" est K.O.!");}
  if(e.pv<=0){e.pv=0;logs.push(e.nom+" est K.O.!");}
  return{logs,j,e,jKO:j.evanoui,eKO:e.pv<=0};
}

function BarrePV({cur,max,grand}){
  const pct=max>0?Math.max(0,cur/max*100):0;
  const col=pct>50?"#40e040":pct>20?"#e8e040":"#e84040";
  const ombre=pct>50?"0 0 8px #40e04066":pct>20?"0 0 8px #e8e04066":"0 0 8px #e8404066";
  return React.createElement("div",{style:{background:"#0a0a18",borderRadius:4,overflow:"hidden",height:grand?12:7,border:"1px solid #1c1c30"}},
    React.createElement("div",{style:{width:pct+"%",height:"100%",background:col,transition:"width .4s,background .4s",boxShadow:ombre}}));
}
function BTyp({type}){return React.createElement("span",{style:{background:TCOL[type]||"#555",color:"#fff",fontSize:7,fontWeight:700,padding:"2px 6px",borderRadius:10,textTransform:"uppercase",letterSpacing:.5,whiteSpace:"nowrap"}},(TNOM[type]||type).toUpperCase());}
function BStatut({status}){
  const m={brn:{c:"#e17055",l:"BRL"},par:{c:"#fdcb6e",l:"PAR"},psn:{c:"#a29bfe",l:"PSN"},bpsn:{c:"#6c5ce7",l:"PSN!"},slp:{c:"#74b9ff",l:"SOM"},frz:{c:"#00cec9",l:"GEL"}};
  const d=status&&m[status];if(!d)return null;
  return React.createElement("span",{style:{background:d.c,color:"#fff",fontSize:7,fontWeight:800,padding:"2px 5px",borderRadius:8}},d.l);
}

/* ═══════════════════════════════════════════════════
   APPLICATION PRINCIPALE
═══════════════════════════════════════════════════ */
function App(){
  const[ecran,setEcran]=useState("genSelect");
  const[genSel,setGenSel]=useState(null);
  const[chargPct,setChargPct]=useState(0);
  const[chargMsg,setChargMsg]=useState("");
  const[equipe,setEquipe]=useState([]);
  const[idxActif,setIdxActif]=useState(0);
  const[inventaire,setInventaire]=useState([]);
  const[médailles,setMédailles]=useState(0);
  /* Carte */
  const[effacés,setEffacés]=useState(new Set(["dep"]));
  const[disponibles,setDisponibles]=useState(["e1","e2"]);
  const[posActuelle,setPosActuelle]=useState("dep");
  const[ennemisNœud,setEnnemisNœud]=useState({});
  const[révélés,setRévélés]=useState({});
  const[nœudEnAttente,setNœudEnAttente]=useState(null);
  const[msgCarte,setMsgCarte]=useState("");
  /* Combat */
  const[ennemi,setEnnemi]=useState(null);
  const[journal,setJournal]=useState([]);
  const[phase,setPhase]=useState("choisir");
  const[voirSac,setVoirSac]=useState(false);
  const[voirÉchange,setVoirÉchange]=useState(false);
  const[besoinÉchange,setBesoinÉchange]=useState(false);
  /* Brouillon */
  const[propsStar,setPropsStar]=useState([]);
  const[propsDraft,setPropsDraft]=useState([]);
  const[typeDraft,setTypeDraft]=useState("starter");
  const[zoneDraft,setZoneDraft]=useState(1);
  const tousPoké=useRef({});
  const réserveRef=useRef({});
  const jRef=useRef(null);

  useEffect(()=>{if(jRef.current)jRef.current.scrollTop=jRef.current.scrollHeight;},[journal]);

  /* ── CHARGEMENT ── */
  async function démarrerChargement(numGen){
    setGenSel(numGen);setEcran("chargement");
    const gd=GENS[numGen];
    /* Starters */
    const idsStart=gd.st;
    /* Ennemis de chaque nœud : piocher dans la bonne zone du bon pool */
    const nœudIds={};
    NOEUDS.filter(n=>n.zone>0).forEach(n=>{
      const pool=gd["z"+n.zone];const deja=Object.values(nœudIds);
      const dispo=pool.filter(id=>!deja.includes(id));
      nœudIds[n.id]=dispo.length?mélange(dispo)[0]:mélange(pool)[0];
    });
    /* Réserve de draft : 3 extra par zone */
    const draftIds={};
    for(let z=1;z<=5;z++){
      const utilisés=Object.entries(nœudIds).filter(([nid])=>{const nd=NOEUDS.find(x=>x.id===nid);return nd&&nd.zone===z;}).map(([,id])=>id);
      const pool=gd["z"+z].filter(id=>!utilisés.includes(id));
      draftIds[z]=mélange(pool).slice(0,4);
    }
    /* IDs uniques à charger */
    const tousIds=[...new Set([...idsStart,...Object.values(nœudIds),...Object.values(draftIds).flat()])];
    const total=tousIds.length;
    const BATCH=6;
    for(let i=0;i<tousIds.length;i+=BATCH){
      const bat=tousIds.slice(i,i+BATCH);
      setChargMsg("Chargement des Pokémon... ("+Math.min(i+BATCH,total)+"/"+total+")");
      const res=await Promise.allSettled(bat.map(id=>chargerPoke(id)));
      res.forEach((r,j)=>{if(r.status==="fulfilled")tousPoké.current[bat[j]]=r.value;});
      setChargPct(0|((i+BATCH)/total*100));
    }
    /* Construire réserve par zone */
    for(let z=1;z<=5;z++){réserveRef.current[z]=draftIds[z].map(id=>tousPoké.current[id]).filter(Boolean);}
    /* Assigner ennemis aux nœuds */
    const assignments={};
    NOEUDS.filter(n=>n.zone>0).forEach(n=>{
      const base=tousPoké.current[nœudIds[n.id]];
      if(base)assignments[n.id]=mkEnnemi(base,ZONE_LV[n.id]||30);
    });
    setEnnemisNœud(assignments);
    /* Starters */
    setPropsStar(idsStart.map(id=>tousPoké.current[id]).filter(Boolean));
    setTypeDraft("starter");setEcran("draft");
  }

  /* ── CLIC NŒUD ── */
  function clicNœud(nœudId){
    const nœud=NOEUDS.find(n=>n.id===nœudId);
    if(!nœud||!disponibles.includes(nœudId))return;
    if(nœudId==="fin"){
      setEquipe(prev=>prev.map(p=>({...p,pv:p.pvMax,status:null,statusCnt:0,evanoui:false})));
      const nc=new Set([...effacés,nœudId]);setEffacés(nc);setPosActuelle(nœudId);setDisponibles([]);
      setMsgCarte("✨ Votre équipe a été entièrement soignée au Centre Pokémon!");
      setTimeout(()=>setEcran("victoire"),800);return;
    }
    let typeN=nœud.type;const rev=révélés[nœudId];
    if(nœud.type==="mystere"&&!rev){
      const r=Math.random();typeN=r<.55?"trainer":r<.78?"objet":"soin";
      setRévélés(prev=>({...prev,[nœudId]:typeN}));
    }else if(rev)typeN=rev;

    if(typeN==="soin"){
      setEquipe(prev=>prev.map(p=>({...p,pv:p.pvMax,status:null,statusCnt:0,evanoui:false})));
      const nc=new Set([...effacés,nœudId]);setEffacés(nc);setPosActuelle(nœudId);
      setDisponibles(nœud.next.filter(id=>!nc.has(id)));
      setMsgCarte("💚 Une source guérisseuse! Votre équipe a récupéré!");return;
    }
    if(typeN==="objet"){
      const pool=OBJETS_PAR_ZONE[nœud.zone]||OBJETS_PAR_ZONE[1];
      const obj=mélange(pool)[0];setInventaire(prev=>[...prev,obj]);
      const nc=new Set([...effacés,nœudId]);setEffacés(nc);setPosActuelle(nœudId);
      setDisponibles(nœud.next.filter(id=>!nc.has(id)));
      setMsgCarte(obj.e+" Trouvé : "+obj.nom+"!");return;
    }
    /* Combat */
    let adv=ennemisNœud[nœudId];
    if(!adv){
      const gd=GENS[genSel];const pool=(gd["z"+nœud.zone]||gd.z1);
      const tids=new Set(equipe.map(t=>t.id));
      const dispo=pool.filter(id=>!tids.has(id));
      const baseId=mélange(dispo)[0]||mélange(pool)[0];
      const base=tousPoké.current[baseId];if(!base)return;
      adv=mkEnnemi(base,ZONE_LV[nœudId]||30);
      setEnnemisNœud(prev=>({...prev,[nœudId]:adv}));
    }
    setNœudEnAttente(nœudId);setEnnemi(adv);
    setJournal(["⚔️ "+GENS[genSel].reg+" — "+adv.nom+" apparaît! (Niv."+adv.lv+")"]);
    setPhase("choisir");setVoirSac(false);setVoirÉchange(false);setBesoinÉchange(false);
    setIdxActif(equipe.findIndex(p=>!p.evanoui));setEcran("combat");
  }

  /* ── VICTOIRE COMBAT ── */
  function aprèsVictoire(éqActuelle,nœudId){
    const nœud=NOEUDS.find(n=>n.id===nœudId);
    const nc=new Set([...effacés,nœudId]);setEffacés(nc);setPosActuelle(nœudId);
    setDisponibles(nœud.next.filter(id=>!nc.has(id)));
    if(nœud.type==="elite")setMédailles(prev=>prev+1);
    const zone=nœud.zone;
    const tids=new Set(éqActuelle.map(t=>t.id));
    const réserve=(réserveRef.current[zone]||[]).filter(p=>!tids.has(p.id));
    if(éqActuelle.length<6&&réserve.length>=2&&Math.random()<.55){
      setPropsDraft(réserve.slice(0,3));setTypeDraft("pokémon");setZoneDraft(zone);
    }else{
      const pool=OBJETS_PAR_ZONE[Math.min(zone+1,5)]||OBJETS_PAR_ZONE[5];
      setPropsDraft(mélange(pool).slice(0,3));setTypeDraft("objet");
    }
    setEcran("draft");
  }

  /* ── COMBAT : CAPACITÉ ── */
  function choisirCap(mi){
    if(phase!=="choisir")return;setPhase("occupé");
    const éq=cop(equipe);const j=éq[idxActif];const e=cop(ennemi);
    const res=résoudreT(j,e,mi);éq[idxActif]=res.j;
    setJournal(prev=>[...prev,...res.logs]);setEquipe(éq);
    if(res.eKO){setEnnemi({...res.e,pv:0});setJournal(prev=>[...prev,"🏆 Victoire!"]);setTimeout(()=>aprèsVictoire(éq,nœudEnAttente),1400);}
    else if(res.jKO){setEnnemi(res.e);
      if(!éq.filter(p=>!p.evanoui).length){setJournal(prev=>[...prev,"💀 Tous vos Pokémon sont K.O..."]);setTimeout(()=>setEcran("défaite"),1400);}
      else{setBesoinÉchange(true);setVoirÉchange(true);setPhase("switch");}
    }else{setEnnemi(res.e);setPhase("choisir");}
  }

  /* ── ÉCHANGE ── */
  function échangerPokémon(idx){
    if(equipe[idx].evanoui||idx===idxActif)return;
    setIdxActif(idx);setVoirÉchange(false);
    if(besoinÉchange){setBesoinÉchange(false);setPhase("choisir");return;}
    setPhase("occupé");
    const éq=cop(equipe);const j=éq[idx];const e=cop(ennemi);
    const em=choisirCapIA(e,j);const logs=["Vous faites appel à "+j.nom+"!"];
    const sr=verifierStatut(e,true);logs.push(...sr.logs);if(sr.ok)logs.push(...executerCap(e,j,em,true));
    logs.push(...finTour(j,false));logs.push(...finTour(e,true));
    if(j.pv<=0){j.evanoui=true;logs.push("Votre "+j.nom+" est K.O.!");}
    if(e.pv<=0)logs.push(e.nom+" est K.O.!");
    éq[idx]=j;setJournal(prev=>[...prev,...logs]);setEquipe(éq);setEnnemi(e);
    if(e.pv<=0){setJournal(prev=>[...prev,"🏆 Victoire!"]);setTimeout(()=>aprèsVictoire(éq,nœudEnAttente),1400);}
    else if(j.pv<=0){if(!éq.filter(p=>!p.evanoui).length)setTimeout(()=>setEcran("défaite"),1200);else{setBesoinÉchange(true);setVoirÉchange(true);setPhase("switch");}}
    else setPhase("choisir");
  }

  /* ── UTILISER OBJET ── */
  function utiliserObjet(obj,tIdx){
    const éq=cop(equipe);const pk=éq[tIdx];
    const inv=[...inventaire];const ri=inv.findIndex(i=>i.id===obj.id);if(ri!==-1)inv.splice(ri,1);
    const logs=[];
    if(obj.heal){const h=Math.min(obj.heal,pk.pvMax-pk.pv);pk.pv=Math.min(pk.pvMax,pk.pv+obj.heal);logs.push(obj.nom+" → +"+h+" PV à "+pk.nom);}
    if(obj.healFull){pk.pv=pk.pvMax;if(obj.cure){pk.status=null;pk.statusCnt=0;}logs.push(obj.nom+" sur "+pk.nom+"! PV max restaurés!");}
    if(obj.cureAll){pk.status=null;pk.statusCnt=0;logs.push(pk.nom+" est soigné!");}
    if(obj.cureStatus){if(pk.status===obj.cureStatus||(obj.cureStatus==="psn"&&pk.status==="bpsn")){pk.status=null;pk.statusCnt=0;logs.push("Statut de "+pk.nom+" soigné!");}}
    if(obj.revive&&pk.evanoui){pk.pv=0|pk.pvMax/2;pk.evanoui=false;logs.push(pk.nom+" revient! ("+pk.pv+" PV)");}
    if(obj.maxRevive&&pk.evanoui){pk.pv=pk.pvMax;pk.evanoui=false;logs.push(pk.nom+" revient avec tous ses PV!");}
    if(obj.maxElixir){pk.caps.forEach(c=>{c.pp=c.maxPp;});logs.push("Tous les PP de "+pk.nom+" restaurés!");}
    if(obj.boost)Object.entries(obj.boost).forEach(([s,v])=>{pk.boost[s]=(pk.boost[s]||0)+v;logs.push(pk.nom+" : "+s+" augmente!");});
    if(obj.held){pk.tenu=obj.held;logs.push(pk.nom+" tient maintenant : "+obj.nom+"!");}
    éq[tIdx]=pk;setEquipe(éq);setInventaire(inv);setJournal(prev=>[...prev,...logs]);setVoirSac(false);
    if(ecran==="combat"&&phase==="choisir"){
      setPhase("occupé");const e=cop(ennemi);const jou=éq[idxActif];
      const em=choisirCapIA(e,jou);const el=[];
      const sr=verifierStatut(e,true);el.push(...sr.logs);if(sr.ok)el.push(...executerCap(e,jou,em,true));
      el.push(...finTour(jou,false));el.push(...finTour(e,true));
      if(jou.pv<=0){jou.evanoui=true;el.push("Votre "+jou.nom+" est K.O.!");}
      if(e.pv<=0)el.push(e.nom+" est K.O.!");
      éq[idxActif]=jou;setEquipe(éq);setEnnemi(e);setJournal(prev=>[...prev,...el]);
      if(e.pv<=0){setJournal(prev=>[...prev,"🏆 Victoire!"]);setTimeout(()=>aprèsVictoire(éq,nœudEnAttente),1400);}
      else if(jou.pv<=0){if(!éq.filter(p=>!p.evanoui).length)setTimeout(()=>setEcran("défaite"),1200);else{setBesoinÉchange(true);setVoirÉchange(true);setPhase("switch");}}
      else setPhase("choisir");
    }
  }

  /* ═══════════════ STYLES ═══════════════ */
  const gc=genSel?GENS[genSel].col:"#a078e8";
  const gc2=genSel?GENS[genSel].col2:"#6848c8";
  const gbkg=genSel?GENS[genSel].bkg:"radial-gradient(ellipse,#180828 0%,#06060f 70%)";
  const CARTE_ST={background:gbkg,color:"#e8e8f8",fontFamily:"'Press Start 2P',monospace"};
  const PANNEAU={width:175,minHeight:"100vh",background:"rgba(8,8,20,0.97)",borderRight:"2px solid rgba(255,255,255,.06)",padding:12,flexShrink:0};
  const PANNEAU_D={...PANNEAU,borderRight:"none",borderLeft:"2px solid rgba(255,255,255,.06)"};
  const TITREP={fontSize:9,color:gc,letterSpacing:2,borderBottom:"1px solid rgba(255,255,255,.08)",paddingBottom:7,marginBottom:10};
  function CARTE(extra){return{background:"rgba(14,14,28,.95)",border:"1px solid rgba(255,255,255,.08)",borderRadius:8,padding:12,backdropFilter:"blur(4px)",...extra};}
  function BTN(c,extra){return{padding:"9px 12px",background:"transparent",border:"2px solid "+c,borderRadius:5,color:c,fontFamily:"'Press Start 2P',monospace",fontSize:8,cursor:"pointer",transition:"background .15s",...extra};}

  function PanneauGauche(){return(
    <div style={PANNEAU}>
      {genSel&&<div style={{...TITREP,fontSize:8}}>{GENS[genSel].n}</div>}
      <div style={TITREP}>ÉQUIPE</div>
      {!equipe.length&&<div style={{fontSize:6,color:"#2a2a40"}}>Aucun Pokémon</div>}
      {equipe.map((p,i)=>(
        <div key={i} style={{marginBottom:12,opacity:p.evanoui?.35:1,background:i===idxActif&&ecran==="combat"?"rgba(255,255,255,.04)":"transparent",borderRadius:5,padding:4}}>
          <div style={{display:"flex",gap:6,marginBottom:4}}>
            <img src={p.sprite} alt="" style={{width:36,height:36}}/>
            <div style={{flex:1}}>
              <div style={{fontSize:7,color:gc,textTransform:"capitalize",marginBottom:1}}>{p.nom}</div>
              <div style={{fontSize:6,color:"#686888"}}>Niv.{p.lv}</div>
              {p.tenu&&<div style={{fontSize:5,color:"#5858a8",marginTop:1}}>📦 {p.tenu.slice(0,8)}</div>}
              <div style={{display:"flex",gap:2,marginTop:2,flexWrap:"wrap"}}>{p.types.map(t=><BTyp key={t} type={t}/>)}</div>
            </div>
          </div>
          <BarrePV cur={p.pv} max={p.pvMax}/>
          <div style={{fontSize:6,color:"#383858",marginTop:1}}>{p.pv}/{p.pvMax} PV</div>
          <BStatut status={p.status}/>
        </div>
      ))}
    </div>
  );}

  function PanneauDroit(){
    const groupés=inventaire.reduce((a,i)=>{a[i.id]=a[i.id]||{obj:i,n:0};a[i.id].n++;return a;},{});
    const parCat=Object.values(groupés).reduce((a,{obj,n})=>{
      const c=obj.cat||"autre";if(!a[c])a[c]=[];a[c].push({obj,n});return a;
    },{});
    const nomsCat={méd:"Médecines",combat:"Combat",baie:"Baies",tenu:"Objets Tenus",autre:"Divers"};
    return(
      <div style={PANNEAU_D}>
        <div style={TITREP}>INVENTAIRE</div>
        {!inventaire.length&&<div style={{fontSize:6,color:"#2a2a40"}}>Sac vide</div>}
        {Object.entries(parCat).map(([cat,items])=>(
          <div key={cat} style={{marginBottom:10}}>
            <div style={{fontSize:6,color:gc2,marginBottom:5,letterSpacing:1}}>{nomsCat[cat]||cat}</div>
            {items.map(({obj,n})=>(
              <div key={obj.id} style={{display:"flex",justifyContent:"space-between",fontSize:6,color:"#c8c0e0",marginBottom:4,padding:"2px 4px",background:"rgba(255,255,255,.03)",borderRadius:3}}>
                <span>{obj.e} {obj.nom.slice(0,11)}</span><span style={{color:"#686880"}}>×{n}</span>
              </div>
            ))}
          </div>
        ))}
        <div style={{...TITREP,marginTop:14}}>MÉDAILLES</div>
        <div style={{display:"flex",flexWrap:"wrap",gap:5,marginTop:4}}>
          {Array.from({length:8}).map((_,i)=>(
            <div key={i} style={{width:22,height:22,borderRadius:"50%",background:i<médailles?gc:"#0c0c18",border:"2px solid "+(i<médailles?gc:"#1c1c30"),boxShadow:i<médailles?"0 0 8px "+gc+"88":"none",transition:"all .3s"}}/>
          ))}
        </div>
        <div style={{...TITREP,marginTop:14}}>CARTE</div>
        <div style={{fontSize:6,color:"#404060"}}>{effacés.size-1}/12 zones</div>
        {posActuelle!=="dep"&&posActuelle!=="fin"&&(()=>{
          const n=NOEUDS.find(x=>x.id===posActuelle);
          if(n&&n.zone&&genSel){const gd=GENS[genSel];return <div style={{fontSize:6,color:gc,marginTop:4}}>{gd.zn?.[n.zone-1]||"Zone "+n.zone}</div>;}
          return null;
        })()}
      </div>

  }

  /* ═══════════════ ÉCRANS ═══════════════ */

  /* ── SÉLECTION GÉNÉRATION ── */
  if(ecran==="genSelect")return(
    <div style={{minHeight:"100vh",background:"radial-gradient(ellipse at 50% 30%,#180828,#06060f)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:20}}>
      <div style={{textAlign:"center",marginBottom:28}}>
        <div style={{fontSize:22,fontWeight:700,background:"linear-gradient(90deg,#a078e8,#e878b8)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent",letterSpacing:3,marginBottom:6}}>
          POKÉLIKE
        </div>
        <div style={{fontSize:9,color:"#484868",letterSpacing:2}}>Choisissez votre génération</div>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:12,maxWidth:720}}>
        {Object.entries(GENS).map(([num,gd])=>(
          <div key={num} onClick={()=>démarrerChargement(+num)}
            style={{background:"rgba(14,14,28,.9)",border:"1px solid rgba(255,255,255,.06)",borderRadius:10,padding:16,cursor:"pointer",textAlign:"center",transition:"all .2s",position:"relative",overflow:"hidden"}}
            onMouseEnter={e=>{e.currentTarget.style.borderColor=gd.col;e.currentTarget.style.boxShadow="0 0 20px "+gd.col+"44";e.currentTarget.style.transform="translateY(-3px)";}}
            onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,.06)";e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="none";}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:3,background:"linear-gradient(90deg,"+gd.col+","+gd.col2+")"}}/>
            <div style={{fontSize:22,marginBottom:6}}>{gd.ico}</div>
            <div style={{fontSize:8,color:gd.col,marginBottom:4,letterSpacing:1}}>{gd.n}</div>
            <div style={{fontSize:9,fontWeight:700,color:"#e8e8f8",marginBottom:3}}>{gd.reg}</div>
            <div style={{fontSize:6,color:"#484868"}}>{gd.ver}</div>
          </div>
        ))}
      </div>
    </div>
  );

  /* ── CHARGEMENT ── */
  if(ecran==="chargement"){const gd=genSel?GENS[genSel]:null;return(
    <div style={{minHeight:"100vh",background:gbkg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{textAlign:"center",maxWidth:340}}>
        <div style={{fontSize:9,color:gc,letterSpacing:2,marginBottom:4}}>{gd?.n||""} — {gd?.reg||""}</div>
        <div style={{fontSize:22,marginBottom:10}}>{gd?.ico||"⚡"}</div>
        <div style={{fontSize:7,color:"#484868",marginBottom:20}}>{chargMsg}</div>
        <div style={{background:"rgba(255,255,255,.05)",borderRadius:6,overflow:"hidden",height:10,marginBottom:8,border:"1px solid rgba(255,255,255,.06)"}}>
          <div style={{width:chargPct+"%",height:"100%",background:"linear-gradient(90deg,"+gc+","+gc2+")",transition:"width .2s",boxShadow:"0 0 10px "+gc+"88"}}/>
        </div>
        <div style={{fontSize:6,color:"#303048"}}>{chargPct}%</div>
      </div>
    </div>
  );}

  /* ── DRAFT / STARTER / RÉCOMPENSE ── */
  if(ecran==="draft"){const gd=genSel?GENS[genSel]:null;
    const picks=typeDraft==="starter"?propsStar:propsDraft;
    const isPoke=typeDraft!=="objet";
    return(
      <div style={{display:"flex",width:"100%",maxWidth:960,minHeight:"100vh"}}>
        <PanneauGauche/>
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",gap:16,padding:20,...CARTE_ST}}>
          <div style={{textAlign:"center",marginBottom:4}}>
            <div style={{fontSize:8,color:gc,letterSpacing:2,marginBottom:6}}>
              {typeDraft==="starter"?"CHOISISSEZ VOTRE STARTER":typeDraft==="pokémon"?"NOUVEAU COÉQUIPIER":"RÉCOMPENSE"}
            </div>
            {typeDraft==="pokémon"&&gd&&<div style={{fontSize:7,color:gc2}}>
              {gd.zn?.[zoneDraft-1]||"Zone "+zoneDraft} — Pokémon de niveau 50
            </div>}
          </div>
          <div style={{display:"flex",gap:14,flexWrap:"wrap",justifyContent:"center",maxWidth:880}}>
            {isPoke?picks.filter(Boolean).map((p,i)=>(
              <div key={i} onClick={()=>{
                const j=mkJoueur(p);
                if(typeDraft==="starter"){setEquipe([j]);setIdxActif(0);setEcran("carte");}
                else{setEquipe(prev=>[...prev,j]);setEcran("carte");}
              }}
                style={{...CARTE({width:198,cursor:"pointer",transition:"all .2s",textAlign:"center"}),position:"relative"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=gc;e.currentTarget.style.boxShadow="0 0 24px "+gc+"44";e.currentTarget.style.transform="translateY(-5px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,.08)";e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="none";}}>
                <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,"+gc+","+gc2+")",borderRadius:"8px 8px 0 0"}}/>
                <div style={{display:"flex",justifyContent:"center",gap:3,marginBottom:8,flexWrap:"wrap",marginTop:6}}>{p.types.map(t=><BTyp key={t} type={t}/>)}</div>
                <img src={p.art||p.sprite} alt={p.nom} style={{width:100,height:100,objectFit:"contain"}}/>
                <div style={{fontSize:9,color:gc,textTransform:"capitalize",margin:"6px 0"}}>{p.nom}</div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:2,fontSize:6,marginBottom:8}}>
                  {[["PV",p.stats.hp],["ATT",p.stats.attack],["DÉF",p.stats.defense],["ATSP",p.stats.specialAttack],["DFSP",p.stats.specialDefense],["VIT",p.stats.speed]].map(([k,v])=>(
                    <div key={k} style={{background:"rgba(255,255,255,.04)",borderRadius:3,padding:"2px 4px",display:"flex",justifyContent:"space-between",border:"1px solid rgba(255,255,255,.05)"}}>
                      <span style={{color:gc2}}>{k}</span><span style={{color:"#a0a0c0"}}>{v}</span>
                    </div>
                  ))}
                </div>
                <div style={{display:"flex",flexWrap:"wrap",gap:2,justifyContent:"center"}}>
                  {p.caps.slice(0,4).map((c,j)=>(
                    <span key={j} style={{background:(TCOL[c.t]||"#555")+"22",border:"1px solid "+(TCOL[c.t]||"#555"),color:TCOL[c.t]||"#aaa",borderRadius:4,padding:"1px 4px",fontSize:7,textTransform:"capitalize"}}>{c.nom.replace(/-/g," ").slice(0,12)}</span>
                  ))}
                </div>
              </div>
            )):picks.filter(Boolean).map((obj,i)=>(
              <div key={i} onClick={()=>{setInventaire(prev=>[...prev,obj]);setEcran("carte");}}
                style={{...CARTE({width:180,cursor:"pointer",transition:"all .2s",textAlign:"center"}),position:"relative"}}
                onMouseEnter={e=>{e.currentTarget.style.borderColor=gc;e.currentTarget.style.boxShadow="0 0 24px "+gc+"44";e.currentTarget.style.transform="translateY(-5px)";}}
                onMouseLeave={e=>{e.currentTarget.style.borderColor="rgba(255,255,255,.08)";e.currentTarget.style.boxShadow="none";e.currentTarget.style.transform="none";}}>
                <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,"+gc+","+gc2+")",borderRadius:"8px 8px 0 0"}}/>
                <div style={{fontSize:10,color:gc2,letterSpacing:1,marginTop:6,marginBottom:4}}>{obj.cat?.toUpperCase()||"OBJET"}</div>
                <div style={{fontSize:44,margin:"10px 0"}}>{obj.e}</div>
                <div style={{fontSize:9,color:gc,marginBottom:5}}>{obj.nom}</div>
                <div style={{fontSize:7,color:"#686888",lineHeight:1.7}}>{obj.desc}</div>
              </div>
            ))}
          </div>
        </div>
        <PanneauDroit/>
      </div>
    );
  }

  /* ── CARTE ── */
  if(ecran==="carte"){const curN=NOEUDS.find(n=>n.id===posActuelle);
    return(
      <div style={{display:"flex",width:"100%",maxWidth:960,minHeight:"100vh"}}>
        <PanneauGauche/>
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"12px 0",...CARTE_ST}}>
          {msgCarte&&<div style={{...CARTE({maxWidth:CARTE_W,marginBottom:10}),fontSize:7,color:gc,textAlign:"center"}}>{msgCarte}</div>}
          <div style={{position:"relative",width:CARTE_W,height:CARTE_H,flexShrink:0}}>
            <CarteSVG genCol={gc}/>
            {NOEUDS.filter(n=>n.id!=="dep").map(nœud=>{
              const isEff=effacés.has(nœud.id),isAv=disponibles.includes(nœud.id);
              const adv=ennemisNœud[nœud.id],rev=révélés[nœud.id]||nœud.type;
              const estElite=nœud.type==="elite";
              const clGlow=isAv&&!isEff?gc:"transparent";
              return(
                <div key={nœud.id} className={isAv&&!isEff?"pulse":""} onClick={()=>isAv&&!isEff&&clicNœud(nœud.id)}
                  style={{position:"absolute",left:nœud.x-20,top:nœud.y-20,width:40,height:40,borderRadius:"50%",
                    background:isEff?"rgba(20,60,20,.9)":nœud.type==="centre"?"rgba(20,80,80,.9)":estElite?"rgba(40,0,80,.9)":"rgba(10,10,30,.9)",
                    border:"2px solid "+(isAv&&!isEff?gc:isEff?"#308830":estElite?gc2:"#1c1c3c"),
                    cursor:isAv&&!isEff?"pointer":"default",display:"flex",alignItems:"center",justifyContent:"center",
                    overflow:"hidden",zIndex:2,transition:"border-color .3s","--gc":clGlow}}>
                  {isEff?<span style={{fontSize:16,color:"#40e040"}}>✓</span>
                   :nœud.type==="centre"?<span style={{fontSize:14}}>🏥</span>
                   :nœud.type==="mystere"&&!révélés[nœud.id]?<span style={{fontSize:11,color:gc,fontFamily:"monospace",fontWeight:"bold"}}>?</span>
                   :adv?<img src={adv.sprite} alt="" style={{width:34,height:34}}/>
                   :<span style={{fontSize:10,color:"#a0a080"}}>?</span>}
                  {estElite&&!isEff&&<div style={{position:"absolute",top:-4,right:-4,width:14,height:14,background:gc2,borderRadius:"50%",border:"2px solid white",fontSize:6,display:"flex",alignItems:"center",justifyContent:"center",color:"#fff",boxShadow:"0 0 6px "+gc2}}>★</div>}
                  {adv&&!isEff&&disponibles.includes(nœud.id)&&<div style={{position:"absolute",bottom:-18,left:"50%",transform:"translateX(-50%)",fontSize:6,color:gc,whiteSpace:"nowrap",textTransform:"capitalize"}}>{adv.nom}</div>}
                </div>
              );
            })}
            {/* Joueur */}
            {curN&&<div style={{position:"absolute",left:curN.x-14,top:curN.y-14,width:28,height:28,borderRadius:"50%",background:"rgba(10,20,60,.9)",border:"2px solid "+gc,zIndex:5,display:"flex",alignItems:"center",justifyContent:"center",overflow:"hidden",boxShadow:"0 0 12px "+gc}}>
              {equipe.find(p=>!p.evanoui)&&<img src={equipe.find(p=>!p.evanoui).sprite} alt="" style={{width:28,height:28}}/>}
            </div>}
          </div>
          <div style={{marginTop:10,fontSize:6,color:"#2a2a40",textAlign:"center"}}>Cliquez un nœud adjacent • ★ Dresseur Élite</div>
        </div>
        <PanneauDroit/>
      </div>
    );
  }

  /* ── COMBAT ── */
  if(ecran==="combat"){
    const joueur=equipe[idxActif];const vivants=equipe.filter(p=>!p.evanoui);
    const CRD=CARTE({width:"100%",maxWidth:440});
    return(
      <div style={{display:"flex",width:"100%",maxWidth:960,minHeight:"100vh"}}>
        <PanneauGauche/>
        <div style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",padding:"12px 8px 20px",gap:8,...CARTE_ST}}>
          {/* Ennemi */}
          {ennemi&&<div style={{...CRD,position:"relative"}}>
            <div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,"+gc+","+gc2+")",borderRadius:"8px 8px 0 0"}}/>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:8,marginTop:4}}>
              <div>
                <div style={{fontSize:10,color:gc,textTransform:"capitalize",marginBottom:4}}>{ennemi.nom}</div>
                <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{ennemi.types.map(t=><BTyp key={t} type={t}/>)}<BStatut status={ennemi.status}/></div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#686888"}}>Niv.{ennemi.lv}</div>
                <div style={{fontSize:7,color:"#404060"}}>{ennemi.pv}/{ennemi.pvMax}</div>
              </div>
            </div>
            <BarrePV cur={ennemi.pv} max={ennemi.pvMax} grand={true}/>
          </div>}
          {ennemi&&<div style={{display:"flex",justifyContent:"flex-end",width:"100%",maxWidth:440,paddingRight:16,marginTop:-4,marginBottom:-14,zIndex:1}}>
            <img src={ennemi.sprite} alt="" style={{width:74,height:74}}/>
          </div>}
          {/* Journal */}
          <div ref={jRef} style={{...CRD,height:88,overflowY:"auto",fontSize:7,color:"#90d048",lineHeight:2.2,fontFamily:"'Courier New',monospace"}}>
            {journal.slice(-25).map((l,i)=><div key={i} style={{borderBottom:"1px solid rgba(255,255,255,.04)",padding:"0 2px"}}>{l}</div>)}
          </div>
          {/* Joueur */}
          {joueur&&<div style={CRD}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <div style={{display:"flex",gap:8}}>
                <img src={joueur.sprite} alt="" style={{width:50,height:50}}/>
                <div>
                  <div style={{fontSize:9,color:gc,textTransform:"capitalize",marginBottom:3}}>{joueur.nom}</div>
                  <div style={{display:"flex",gap:3,flexWrap:"wrap"}}>{joueur.types.map(t=><BTyp key={t} type={t}/>)}<BStatut status={joueur.status}/></div>
                  {joueur.tenu&&<div style={{fontSize:6,color:"#5050a8",marginTop:2}}>📦 {joueur.tenu}</div>}
                </div>
              </div>
              <div style={{textAlign:"right"}}>
                <div style={{fontSize:9,color:"#686888"}}>Niv.{joueur.lv}</div>
                <div style={{fontSize:7,color:"#404060"}}>{joueur.pv}/{joueur.pvMax} PV</div>
              </div>
            </div>
            <BarrePV cur={joueur.pv} max={joueur.pvMax} grand={true}/>
          </div>}
          {/* Capacités */}
          {!voirSac&&!voirÉchange&&joueur&&phase==="choisir"&&<div style={{width:"100%",maxWidth:440}}>
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,marginBottom:7}}>
              {joueur.caps.map((c,i)=>(
                <button key={i} onClick={()=>choisirCap(i)} disabled={c.pp<=0}
                  style={{background:c.pp>0?(TCOL[c.t]||"#555")+"18":"#080810",border:"1px solid "+(c.pp>0?(TCOL[c.t]||"#555"):"#1a1a2a"),borderRadius:6,padding:"10px 10px",cursor:c.pp>0?"pointer":"not-allowed",color:c.pp>0?"#e8e0d8":"#282838",display:"flex",flexDirection:"column",gap:4,textAlign:"left",fontFamily:"'Press Start 2P',monospace"}}
                  onMouseEnter={e=>{if(c.pp>0)e.currentTarget.style.background=(TCOL[c.t]||"#555")+"30";}}
                  onMouseLeave={e=>{e.currentTarget.style.background=c.pp>0?(TCOL[c.t]||"#555")+"18":"#080810";}}>
                  <div style={{fontSize:8,fontWeight:700,textTransform:"capitalize"}}>{c.nom.replace(/-/g," ")}</div>
                  <div style={{display:"flex",gap:4,alignItems:"center"}}><BTyp type={c.t}/><span style={{fontSize:6,color:"#a0a0b8"}}>{c.p?c.p:"—"} {c.dc==="phy"?"⚔":"✨"}</span></div>
                  <div style={{fontSize:6,color:c.pp<=c.maxPp*.3?"#e84040":"#686888",textAlign:"right"}}>{c.pp}/{c.maxPp} PP</div>
                </button>
              ))}
            </div>
            <div style={{display:"flex",gap:7}}>
              <button onClick={()=>setVoirSac(true)} style={{...BTN(gc),flex:1}}>🎒 SAC ({inventaire.length})</button>
              <button onClick={()=>setVoirÉchange(true)} disabled={vivants.length<=1} style={{...BTN(gc2),flex:1,opacity:vivants.length<=1?.35:1}}>⇄ ÉCHANGE</button>
            </div>
          </div>}
          {!voirSac&&!voirÉchange&&phase==="occupé"&&<div style={{color:"#2a2a48",fontSize:8,padding:12}}>⏳</div>}
          {/* Sac */}
          {voirSac&&<div style={{...CARTE({width:"100%",maxWidth:440}),maxHeight:320,overflowY:"auto"}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontSize:9,color:gc}}>🎒 SAC</span>
              <button onClick={()=>setVoirSac(false)} style={{background:"none",border:"none",color:"#484868",fontSize:14,cursor:"pointer"}}>✕</button>
            </div>
            {!inventaire.length&&<div style={{fontSize:7,color:"#303050",textAlign:"center",padding:12}}>Sac vide!</div>}
            {Object.entries(inventaire.reduce((a,i)=>{a[i.id]=a[i.id]||{obj:i,n:0};a[i.id].n++;return a;},{})).map(([id,{obj,n}])=>(
              <div key={id} style={{marginBottom:8,background:"rgba(255,255,255,.03)",borderRadius:5,padding:6}}>
                <div style={{fontSize:7,color:"#c0b8d8",marginBottom:5}}>{obj.e} {obj.nom} ×{n} <span style={{fontSize:6,color:"#484868"}}>— {obj.desc}</span></div>
                {(obj.maxRevive||obj.revive)?equipe.filter(p=>p.evanoui).map(p=>{const ti=equipe.findIndex(t=>t.id===p.id);return(
                  <button key={ti} onClick={()=>utiliserObjet(obj,ti)} style={{...BTN(gc2),display:"block",width:"100%",marginBottom:3,padding:"5px 8px",textTransform:"capitalize",textAlign:"left",fontSize:7}}>Sur {p.nom} (K.O.)</button>
                );}):!obj.held?equipe.filter(p=>!p.evanoui).map(p=>{const ti=equipe.findIndex(t=>t.id===p.id);return(
                  <button key={ti} onClick={()=>utiliserObjet(obj,ti)} style={{...BTN(gc),display:"block",width:"100%",marginBottom:3,padding:"5px 8px",textTransform:"capitalize",textAlign:"left",fontSize:7}}>Sur {p.nom}</button>
                );}):equipe.filter(p=>!p.evanoui&&!p.tenu).map(p=>{const ti=equipe.findIndex(t=>t.id===p.id);return(
                  <button key={ti} onClick={()=>utiliserObjet(obj,ti)} style={{...BTN(gc2),display:"block",width:"100%",marginBottom:3,padding:"5px 8px",textTransform:"capitalize",textAlign:"left",fontSize:7}}>Donner à {p.nom}</button>
                );})}
              </div>
            ))}
          </div>}
          {/* Échange */}
          {voirÉchange&&<div style={{...CARTE({width:"100%",maxWidth:440})}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontSize:9,color:gc}}>{besoinÉchange?"QUI COMBAT?":"ÉCHANGE"}</span>
              {!besoinÉchange&&<button onClick={()=>setVoirÉchange(false)} style={{background:"none",border:"none",color:"#484868",fontSize:14,cursor:"pointer"}}>✕</button>}
            </div>
            {equipe.map((p,i)=>(
              <button key={i} onClick={()=>!p.evanoui&&i!==idxActif&&échangerPokémon(i)} disabled={p.evanoui||i===idxActif}
                style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"7px 8px",marginBottom:5,background:i===idxActif?"rgba(255,255,255,.05)":p.evanoui?"rgba(0,0,0,.3)":"rgba(255,255,255,.03)",border:"1px solid "+(i===idxActif?gc:p.evanoui?"#1a1a2a":"#20203a"),borderRadius:5,color:p.evanoui?"#282838":"#c0c0d8",cursor:p.evanoui||i===idxActif?"not-allowed":"pointer",opacity:p.evanoui?.35:1,fontFamily:"'Press Start 2P',monospace"}}>
                <img src={p.sprite} alt="" style={{width:32,height:32}}/>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{fontSize:8,textTransform:"capitalize",color:i===idxActif?gc:"#c0c0d8"}}>{p.nom}</div>
                  <div style={{fontSize:6,color:"#484868"}}>{p.pv}/{p.pvMax} PV {p.evanoui?"(K.O.)":i===idxActif?"(Combat)":""}</div>
                </div>
                <div style={{width:60}}><BarrePV cur={p.pv} max={p.pvMax}/></div>
              </button>
            ))}
          </div>}
        </div>
        <PanneauDroit/>
      </div>
    );
  }

  /* ── DÉFAITE ── */
  if(ecran==="défaite")return(
    <div style={{minHeight:"100vh",background:gbkg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{...CARTE({maxWidth:400,textAlign:"center"})}}>
        <div style={{fontSize:40,marginBottom:10}}>💀</div>
        <div style={{fontSize:11,color:"#e84848",marginBottom:8,letterSpacing:2}}>DÉFAITE</div>
        <div style={{fontSize:7,color:"#484868",marginBottom:16}}>{effacés.size-1} zones effacées • {médailles} médailles</div>
        {equipe.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
            <img src={p.sprite} alt="" style={{width:32,height:32,opacity:p.evanoui?.3:1}}/>
            <span style={{fontSize:7,textTransform:"capitalize",color:p.evanoui?"#282838":"#c0c0d0",flex:1,textAlign:"left"}}>{p.nom}</span>
            {p.evanoui?<span style={{fontSize:6,color:"#803030"}}>K.O.</span>:<span style={{fontSize:6,color:"#308030"}}>{p.pv}/{p.pvMax}</span>}
          </div>
        ))}
        <button onClick={()=>{setEcran("genSelect");setEquipe([]);setInventaire([]);setMédailles(0);setEffacés(new Set(["dep"]));setDisponibles(["e1","e2"]);setPosActuelle("dep");setEnnemisNœud({});setRévélés({});setGenSel(null);setChargPct(0);tousPoké.current={};réserveRef.current={};}}
          style={{...BTN("#e84848"),marginTop:16,padding:"10px 24px",fontSize:9}}>RECOMMENCER</button>
      </div>
    </div>
  );

  /* ── VICTOIRE ── */
  if(ecran==="victoire")return(
    <div style={{minHeight:"100vh",background:gbkg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{...CARTE({maxWidth:420,textAlign:"center"}),border:"1px solid "+gc}}>
        <div style={{position:"relative",height:3,background:"linear-gradient(90deg,"+gc+","+gc2+")",marginBottom:16,borderRadius:3}}/>
        <div style={{fontSize:40,marginBottom:10}}>🏆</div>
        <div style={{fontSize:11,color:gc,marginBottom:6,letterSpacing:2}}>CHAMPION!</div>
        <div style={{fontSize:8,color:"#686888",marginBottom:4}}>Région {genSel?GENS[genSel].reg:""} conquise!</div>
        <div style={{fontSize:7,color:"#484868",marginBottom:14}}>{médailles} médailles remportées</div>
        {equipe.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"4px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
            <img src={p.sprite} alt="" style={{width:32,height:32}}/>
            <span style={{fontSize:7,textTransform:"capitalize",flex:1,textAlign:"left"}}>{p.nom}</span>
            {p.tenu&&<span style={{fontSize:6,color:gc2}}>📦 {p.tenu.slice(0,8)}</span>}
          </div>
        ))}
        <button onClick={()=>{setEcran("genSelect");setEquipe([]);setInventaire([]);setMédailles(0);setEffacés(new Set(["dep"]));setDisponibles(["e1","e2"]);setPosActuelle("dep");setEnnemisNœud({});setRévélés({});setGenSel(null);setChargPct(0);tousPoké.current={};réserveRef.current={};}}
          style={{...BTN(gc),marginTop:14,padding:"10px 24px",fontSize:9}}>REJOUER</button>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
