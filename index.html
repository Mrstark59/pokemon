*{box-sizing:border-box;margin:0;padding:0;}
html,body{background:#06060f;color:#e8e8f8;font-family:'Press Start 2P',monospace;min-height:100vh;}
img{image-rendering:pixelated;}
@keyframes pulse{0%,100%{box-shadow:0 0 8px var(--gc,#e8d048)55,0 0 20px var(--gc,#e8d048)22;}50%{box-shadow:0 0 18px var(--gc,#e8d048)aa,0 0 40px var(--gc,#e8d048)55;}}
@keyframes shake{0%,100%{transform:translateX(0);}25%{transform:translateX(-4px);}75%{transform:translateX(4px);}}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.pulse{animation:pulse 2s ease-in-out infinite;}
.fadeUp{animation:fadeUp .3s ease-out;}
::-webkit-scrollbar{width:4px;}::-webkit-scrollbar-track{background:#06060f;}::-webkit-scrollbar-thumb{background:#2a2a4a;border-radius:2px;}
</style>

const mél=a=>{const r=[...a];for(let i=r.length-1;i>0;i--){const j=0|Math.random()*(i+1);[r[i],r[j]]=[r[j],r[i]];}return r;};
const alea=n=>0|Math.random()*n;
const cop=o=>JSON.parse(JSON.stringify(o));
const cS=(b,pv,lv)=>pv?(0|(2*b+31)*lv/100)+lv+10:(0|(2*b+31)*lv/100)+5;
const bM=b=>b>=0?(2+b)/2:2/(2-b);

function effS(pk,stat){
  const b=pk.stats,base={attack:b.attack,defense:b.defense,specialAttack:b.specialAttack,specialDefense:b.specialDefense,speed:b.speed}[stat];
  let v=0|cS(base,false,pk.lv)*bM(pk.boost[stat]||0);
  if(stat==="attack"&&pk.status==="brn")v=0|v*.5;
  if(stat==="speed"&&pk.status==="par")v=0|v*.5;
  if(stat==="attack"&&pk.tenu==="choice-band")v=0|v*1.5;
  if(stat==="specialAttack"&&pk.tenu==="choice-specs")v=0|v*1.5;
  if(stat==="speed"&&pk.tenu==="choice-scarf")v=0|v*1.5;
  if(stat==="specialDefense"&&pk.tenu==="assault-vest")v=0|v*1.5;
  return Math.max(1,v);
}
function cDmg(atk,mv,def){
  if(!mv.p)return{d:0,eff:1,crit:false};
  const eff=typeEff(mv.t,def.types);if(eff===0)return{d:0,eff:0,crit:false};
  if(mv.t==="ground"&&def.tenu==="air-balloon")return{d:0,eff:0,crit:false,balloon:true};
  const phy=mv.dc==="phy",a=effS(atk,phy?"attack":"specialAttack"),d=effS(def,phy?"defense":"specialDefense");
  let dm=(0|(0|(2*50/5+2)*mv.p*a/d)/50)+2;
  if(atk.types.includes(mv.t))dm=0|dm*1.5;dm=0|dm*eff;
  if(atk.tenu==="life-orb")dm=0|dm*1.3;
  if(atk.tenu==="expert-belt"&&eff>1)dm=0|dm*1.2;
  if(phy&&atk.tenu==="muscle-band")dm=0|dm*1.1;
  if(!phy&&atk.tenu==="wise-glasses")dm=0|dm*1.1;
  const tc=mv.crit?1/4:atk.tenu==="scope-lens"?1/8:1/24;
  const crit=Math.random()<tc;if(crit)dm=0|dm*1.5;
  return{d:Math.max(1,0|dm*((alea(16)+85)/100)),eff,crit};
}
function iaMove(en,jou){
  const v=en.caps.filter(c=>c.pp>0);
  if(!v.length)return{nom:"Lutte",p:50,t:"normal",dc:"phy",a:100,pp:1,maxPp:1,rcl:.25};
  const s=v.map(c=>({c,s:c.p?(c.p*typeEff(c.t,jou.types)*(en.types.includes(c.t)?1.5:1)):((c.sta&&!jou.status)?40:3)}));
  s.sort((a,b)=>b.s-a.s);return Math.random()<.8?s[0].c:v[alea(v.length)];
}
async function charger(id){
  const r=await fetch("https://pokeapi.co/api/v2/pokemon/"+id);const d=await r.json();
  const types=d.types.map(t=>t.type.name);
  const st={hp:d.stats[0].base_stat,attack:d.stats[1].base_stat,defense:d.stats[2].base_stat,
    specialAttack:d.stats[3].base_stat,specialDefense:d.stats[4].base_stat,speed:d.stats[5].base_stat};
  const appris=new Set(d.moves.map(m=>m.move.name));
  const ok=Object.entries(CAP).filter(([n])=>appris.has(n)).map(([nom,def])=>({nom,...def,pp:def.pp,maxPp:def.pp}));
  const stab=mél(ok.filter(m=>m.p>0&&types.includes(m.t)));
  const aut=mél(ok.filter(m=>m.p>0&&!types.includes(m.t)));
  const sta=mél(ok.filter(m=>!m.p));
  let sel=[...stab.slice(0,2),...aut.slice(0,1),...sta.slice(0,1)];
  const us=new Set(sel.map(m=>m.nom));
  [...stab,...aut].filter(m=>!us.has(m.nom)).forEach(m=>{if(sel.length<4)sel.push(m);});
  if(!sel.length)sel.push({nom:"tackle",...CAP.tackle,pp:35,maxPp:35});
  const art=(d.sprites.other&&d.sprites.other["official-artwork"])?d.sprites.other["official-artwork"].front_default:null;
  const back=d.sprites.back_default||d.sprites.front_default;
  return{id:d.id,nom:d.name,spr:d.sprites.front_default,art:art||d.sprites.front_default,back:back||d.sprites.front_default,
    types,stats:st,caps:sel.slice(0,4),boost:{attack:0,defense:0,specialAttack:0,specialDefense:0,speed:0},
    status:null,statusCnt:0,tenu:null,sashUsed:false,evanoui:false};
}

   MOTEUR DE COMBAT
================================================================ */
const ST_BAIE={"cheri-berry":"par","pecha-berry":"psn","rawst-berry":"brn","aspear-berry":"frz","chesto-berry":"slp"};
const B_BOOST={"salac-berry":"speed","liechi-berry":"attack","petaya-berry":"specialAttack"};

function vStat(pk,ie){
  const n=ie?pk.nom:"Votre "+pk.nom;if(!pk.status)return{ok:true,logs:[]};
  if(pk.status==="slp"){if(pk.statusCnt<=0){pk.status=null;return{ok:true,logs:[n+" se réveille!"]};}pk.statusCnt--;return{ok:false,logs:[n+" dort profondément!"]};}
  if(pk.status==="frz"){if(Math.random()<.2){pk.status=null;return{ok:true,logs:[n+" se dégèle!"]};}return{ok:false,logs:[n+" est gelé!"]};}
  if(pk.status==="par"&&Math.random()<.25)return{ok:false,logs:[n+" est paralysé!"]};
  return{ok:true,logs:[]};
}
function eot(pk,ie){
  const n=ie?pk.nom:"Votre "+pk.nom,logs=[];if(pk.pv<=0)return logs;
  if(pk.status==="brn"){const d=0|pk.pvMax/8;pk.pv=Math.max(0,pk.pv-d);logs.push(n+" souffre de sa brûlure ! (−"+d+")");}
  else if(pk.status==="psn"){const d=0|pk.pvMax/8;pk.pv=Math.max(0,pk.pv-d);logs.push(n+" souffre du poison ! (−"+d+")");}
  else if(pk.status==="bpsn"){pk.statusCnt=(pk.statusCnt||1)+1;const d=0|pk.pvMax*pk.statusCnt/16;pk.pv=Math.max(0,pk.pv-d);logs.push(n+" est gravement empoisonné ! (−"+d+")");}
  if(pk.tenu==="leftovers"&&pk.pv>0){const h=0|pk.pvMax/16;pk.pv=Math.min(pk.pvMax,pk.pv+h);logs.push(n+" récupère grâce aux Restes (+"+h+")");}
  if(pk.tenu==="sitrus-berry"&&pk.pv>0&&pk.pv<=pk.pvMax*.5){const h=0|pk.pvMax*.25;pk.pv=Math.min(pk.pvMax,pk.pv+h);pk.tenu=null;logs.push(n+" mange sa Baie Sitrus ! (+"+h+")");}
  if(pk.pv>0&&pk.pv<=pk.pvMax*.25&&pk.tenu&&B_BOOST[pk.tenu]){
    const stat=B_BOOST[pk.tenu];pk.boost[stat]=(pk.boost[stat]||0)+1;pk.tenu=null;logs.push(n+" est stimulé par sa Baie !");
  }
  return logs;
}
function exeCap(atk,def,mv,ie){
  const n=ie?atk.nom:"Votre "+atk.nom,t=ie?"Votre "+def.nom:def.nom;
  const fr=nomCap(mv.nom);
  const logs=[n+" utilise "+fr+" !"];
  if(mv.a!==999&&Math.random()*100>mv.a){if(mv.pp!==undefined)mv.pp=Math.max(0,mv.pp-1);logs.push("La capacité a échoué !");return logs;}
  if(mv.pp!==undefined)mv.pp=Math.max(0,mv.pp-1);
  if(mv.dc==="sta"){
    if(mv.sta){if(def.status){logs.push(t+" a déjà un trouble de statut !");}
    else{const im=(mv.sta==="par"&&def.types.includes("electric"))||(mv.sta==="psn"&&(def.types.includes("poison")||def.types.includes("steel")))||(mv.sta==="brn"&&def.types.includes("fire"));
      if(im)logs.push("Ça n'affecte pas "+t+" !");
      else{def.status=mv.sta;def.statusCnt=mv.sta==="slp"?1+alea(3):0;
        const sb=Object.entries(ST_BAIE).find(([b,s])=>def.tenu===b&&s===def.status);
        if(sb){def.status=null;def.tenu=null;logs.push("La Baie de "+t+" soigne le statut !");}
        else{const lb={brn:"brûlé",par:"paralysé",psn:"empoisonné",bpsn:"gravement empoisonné",slp:"endormi",frz:"gelé"};logs.push(t+" est "+lb[mv.sta]+" !");}
      }
    }return logs;}
  }
  const res=cDmg(atk,mv,def);
  if(res.balloon){def.tenu=null;logs.push(t+" est immunisé — le Ballon Air éclate !");return logs;}
  if(res.crit)logs.push("Coup critique !");
  if(res.eff===0){logs.push("Ça n'affecte pas "+t+" !");return logs;}
  if(res.eff>=4)logs.push("C'est super efficace !! (×4)");else if(res.eff>=2)logs.push("C'est super efficace !");else if(res.eff<1)logs.push("Ce n'est pas très efficace...");
  if(def.tenu==="focus-sash"&&!def.sashUsed&&def.pv===def.pvMax&&res.d>=def.pv){def.pv=1;def.sashUsed=true;logs.push(t+" résiste grâce à la Ceinture Focus !");}
  else{def.pv=Math.max(0,def.pv-res.d);logs.push(t+" perd "+res.d+" PV !");}
  if(def.tenu==="air-balloon"&&res.d>0)def.tenu=null;
  if(mv.eff&&mv.ec&&Math.random()*100<mv.ec&&!def.status){
    const im=(mv.eff==="par"&&def.types.includes("electric"))||(mv.eff==="psn"&&(def.types.includes("poison")||def.types.includes("steel")))||(mv.eff==="brn"&&def.types.includes("fire"));
    if(!im){def.status=mv.eff;if(mv.eff==="slp")def.statusCnt=1+alea(3);
      const sb=Object.entries(ST_BAIE).find(([b,s])=>def.tenu===b&&s===def.status);
      if(sb){def.status=null;def.tenu=null;logs.push("La Baie de "+t+" soigne le statut !");}
      else{const lb={brn:"brûlé",par:"paralysé",psn:"empoisonné",frz:"gelé"};if(lb[mv.eff])logs.push(t+" est "+lb[mv.eff]+" !");}
    }
  }
  if(mv.rcl&&atk.pv>0){const r=Math.max(1,0|res.d*mv.rcl);atk.pv=Math.max(0,atk.pv-r);logs.push(n+" subit "+r+" PV de recul !");}
  if(atk.tenu==="life-orb"&&atk.pv>0){const r=Math.max(1,0|atk.pvMax*.1);atk.pv=Math.max(0,atk.pv-r);logs.push("Recul Orbe Vie ! (−"+r+")");}
  if(def.tenu==="rocky-helmet"&&mv.dc==="phy"&&atk.pv>0){const r=Math.max(1,0|def.pvMax/6);atk.pv=Math.max(0,atk.pv-r);logs.push(n+" blessé par le Casque Rocher ! (−"+r+")");}
  if(atk.tenu==="shell-bell"&&res.d>0&&atk.pv>0){const h=Math.max(1,0|res.d/8);atk.pv=Math.min(atk.pvMax,atk.pv+h);logs.push(n+" récupère grâce à la Sonnaille ! (+"+h+")");}
  const sb2=Object.entries(ST_BAIE).find(([b,s])=>def.tenu===b&&def.status===s);
  if(sb2){def.status=null;def.tenu=null;logs.push("La Baie de "+t+" soigne son statut !");}
  return logs;
}
function rTour(jou,enn,mi){
  const j=cop(jou),e=cop(enn),logs=[];
  const jm=j.caps[mi],em=iaMove(e,j);
  const jV=effS(j,"speed"),eV=effS(e,"speed");
  const jPri=jm&&jm.pri||0,ePri=em.pri||0;
  const jFirst=jm&&(jPri>ePri||(jPri===ePri&&(jV>eV||(jV===eV&&Math.random()<.5))));
  function aller(a1,d1,mv1,a1e,a2,d2,mv2,a2e){
    const r1=vStat(a1,a1e);logs.push(...r1.logs);if(r1.ok)logs.push(...exeCap(a1,d1,mv1,a1e));
    if(d1.pv<=0)return true;
    const r2=vStat(a2,a2e);logs.push(...r2.logs);if(r2.ok)logs.push(...exeCap(a2,d2,mv2,a2e));
    return false;
  }
  const tôt=jFirst?aller(j,e,jm,false,e,j,em,true):aller(e,j,em,true,j,e,jm,false);
  if(!tôt){logs.push(...eot(j,false));logs.push(...eot(e,true));}
  if(j.pv<=0){j.pv=0;j.evanoui=true;logs.push("Votre "+j.nom+" est K.O. !");}
  if(e.pv<=0){e.pv=0;logs.push(e.nom+" est K.O. !");}
  return{logs,j,e,jKO:j.evanoui,eKO:e.pv<=0};
}

function App(){

  const[msg,setMsg]=useState("");
  const[equipe,setEquipe]=useState([]);
  const[idx,setIdx]=useState(0);
  const[sac,setSac]=useState([]);
  const[badges,setBadges]=useState(0);
  const[effacés,setEffacés]=useState(new Set(["dep"]));
  const[dispos,setDispos]=useState(["ra1","ra2"]);
  const[pos,setPos]=useState("dep");
  const[ennemis,setEnnemis]=useState({});
  const[révélés,setRévélés]=useState({});
  const[nœud,setNœud]=useState(null);
  const[msgCarte,setMsgCarte]=useState("");
  const[foe,setFoe]=useState(null);
  const[journal,setJournal]=useState([]);
  const[phase,setPhase]=useState("choisir");
  const[voirSac,setVoirSac]=useState(false);
  const[voirÉch,setVoirÉch]=useState(false);
  const[besoinÉch,setBesoinÉch]=useState(false);
  const[picks,setPicks]=useState([]);
  const[typePick,setTypePick]=useState("starter");
  const[zonePick,setZonePick]=useState(1);
  const tousP=useRef({});
  const réserve=useRef({});
  const gymsP=useRef({});
  const jRef=useRef(null);

  useEffect(()=>{if(jRef.current)jRef.current.scrollTop=jRef.current.scrollHeight;},[journal]);

  async function start(ng){
    setGen(ng);setEcran("chargement");
    const gd=GENS[ng];
    /* Starters */
    const stIds=gd.starters;
    /* Zones */
    const zoneIds={};
    [1,2,3,4].forEach(z=>{
      const pool=gd.zones[z].ids;const utilisés=[];
      zoneIds[z]=mél(pool).slice(0,5);
    });
    /* Gyms (arènes + champion) */
    const gymIds=gd.arenes.map(a=>a.id).concat([gd.champion.id]);
    /* All unique */
    const tous=[...new Set([...stIds,...Object.values(zoneIds).flat(),...gymIds])];
    const tot=tous.length;const BATCH=6;
    for(let i=0;i<tous.length;i+=BATCH){
      const bat=tous.slice(i,i+BATCH);
      setMsg("Chargement... ("+Math.min(i+BATCH,tot)+"/"+tot+")");
      const res=await Promise.allSettled(bat.map(id=>charger(id)));
      res.forEach((r,j)=>{if(r.status==="fulfilled")tousP.current[bat[j]]=r.value;});
      setPct(0|((i+BATCH)/tot*100));
    }
    /* Réserve par zone */
    [1,2,3,4].forEach(z=>{réserve.current[z]=zoneIds[z].map(id=>tousP.current[id]).filter(Boolean);});
    /* Gyms pokémon */
    gd.arenes.forEach((a,i)=>{gymsP.current["arene"+(i+1)]=tousP.current[a.id];});
    gymsP.current["champion"]=tousP.current[gd.champion.id];
    /* Ennemis routes */
    const ass={};
    NOEUDS.filter(n=>n.zone>0&&n.type==="route").forEach(n=>{
      const pool=réserve.current[n.zone]||[];
      const b=mél(pool)[0];
      if(b)ass[n.id]=mkE(b,ZONE_LV[n.id]||10);
    });
    setEnnemis(ass);
    setPicks(stIds.map(id=>tousP.current[id]).filter(Boolean));
    setTypePick("starter");setEcran("draft");
  }

  function gymInfo(id){const gd=GENS[gen];const i=parseInt(id.replace("arene",""))-1;return i>=0?gd.arenes[i]:gd.champion;}

  function clicNœud(nid){
    const nd=NOEUDS.find(n=>n.id===nid);
    if(!nd||!dispos.includes(nid))return;
    if(nid==="champion"){
      /* victoire finale */
      const gi=gymInfo("champion");const base=gymsP.current["champion"];
      if(!base)return;
      const adv=mkE(base,GENS[gen].champion.lv);
      setNœud(nid);setFoe(adv);
      setJournal(["🏆 "+gi.ville||"Ligue"+" — "+gi.nom+" veut se battre ! (Niv."+adv.lv+")"]);
      setPhase("choisir");setVoirSac(false);setVoirÉch(false);setBesoinÉch(false);
      setIdx(equipe.findIndex(p=>!p.evanoui));setEcran("combat");return;
    }
    /* Arène */
    if(nd.type==="arene"){
      const gi=gymInfo(nid);const base=gymsP.current[nid];
      if(!base)return;
      const gd=GENS[gen];const zoneIdx=nd.zone-1;

      setNœud(nid);setFoe(adv);
      setJournal(["⚔️ Arène de "+gd.arenes[zoneIdx]?.ville+" — "+gd.arenes[zoneIdx]?.nom+" vous défie ! (Niv."+adv.lv+")"]);
      setPhase("choisir");setVoirSac(false);setVoirÉch(false);setBesoinÉch(false);
      setIdx(equipe.findIndex(p=>!p.evanoui));setEcran("combat");return;
    }
    /* Mystère */
    let typeN=nd.type;const rev=révélés[nid];
    if(nd.type==="mystere"&&!rev){
      const r=Math.random();typeN=r<.55?"route":r<.78?"objet":"soin";
      setRévélés(prev=>({...prev,[nid]:typeN}));

      const nc=new Set([...effacés,nid]);setEffacés(nc);setPos(nid);

      const dispo=pool.filter(p=>!tids.has(p.id));const base=mél(dispo.length?dispo:pool)[0];

      setEnnemis(prev=>({...prev,[nid]:adv}));

    setNœud(nid);setFoe(adv);
    const gd=GENS[gen];const zNom=gd.zones[nd.zone]?.nom||"Zone";
    setJournal(["⚔️ "+zNom+" — Un "+adv.nom+" sauvage apparaît ! (Niv."+adv.lv+")"]);
    setPhase("choisir");setVoirSac(false);setVoirÉch(false);setBesoinÉch(false);
    setIdx(equipe.findIndex(p=>!p.evanoui));setEcran("combat");
  }

  function aprèsVictoire(éq,nid){
    const nd=NOEUDS.find(n=>n.id===nid);
    const nc=new Set([...effacés,nid]);setEffacés(nc);setPos(nid);
    const prochains=nd.next.filter(id=>!nc.has(id));setDispos(prochains);
    const estArène=nd.type==="arene"||nd.type==="champion";
    if(estArène)setBadges(prev=>prev+1);
    if(nd.type==="champion"){setEcran("victoire");return;}
    const zone=nd.zone;
    const tids=new Set(éq.map(t=>t.id));
    const pool=(réserve.current[zone]||[]).filter(p=>!tids.has(p.id));
    if(éq.length<6&&pool.length>=2&&Math.random()<.6){
      setPicks(pool.slice(0,3));setTypePick("pokémon");setZonePick(zone);
    }else{
      const objPool=OBJETS_ZONE[Math.min(zone+1,4)]||OBJETS_ZONE[4];
      setPicks(mél(objPool).slice(0,3));setTypePick("objet");
    }
    setEcran("draft");
  }

  function choisirCap(mi){
    if(phase!=="choisir")return;setPhase("occupé");
    const éq=cop(equipe);const j=éq[idx];const e=cop(foe);
    const res=rTour(j,e,mi);éq[idx]=res.j;
    setJournal(prev=>[...prev,...res.logs]);setEquipe(éq);
    if(res.eKO){setFoe({...res.e,pv:0});setJournal(prev=>[...prev,"🏆 Victoire !"]);setTimeout(()=>aprèsVictoire(éq,nœud),1400);}
    else if(res.jKO){setFoe(res.e);
      if(!éq.filter(p=>!p.evanoui).length){setJournal(prev=>[...prev,"💀 Tous vos Pokémon sont K.O."]);setTimeout(()=>setEcran("défaite"),1400);}
      else{setBesoinÉch(true);setVoirÉch(true);setPhase("switch");}
    }else{setFoe(res.e);setPhase("choisir");}
  }

  function échanger(i){
    if(equipe[i].evanoui||i===idx)return;
    setIdx(i);setVoirÉch(false);
    if(besoinÉch){setBesoinÉch(false);setPhase("choisir");return;}
    setPhase("occupé");
    const éq=cop(equipe);const j=éq[i];const e=cop(foe);
    const em=iaMove(e,j);const logs=["Vous faites appel à "+j.nom+" !"];
    const sr=vStat(e,true);logs.push(...sr.logs);if(sr.ok)logs.push(...exeCap(e,j,em,true));
    logs.push(...eot(j,false));logs.push(...eot(e,true));
    if(j.pv<=0){j.evanoui=true;logs.push("Votre "+j.nom+" est K.O. !");}
    if(e.pv<=0)logs.push(e.nom+" est K.O. !");
    éq[i]=j;setJournal(prev=>[...prev,...logs]);setEquipe(éq);setFoe(e);
    if(e.pv<=0){setJournal(prev=>[...prev,"🏆 Victoire !"]);setTimeout(()=>aprèsVictoire(éq,nœud),1400);}
    else if(j.pv<=0){if(!éq.filter(p=>!p.evanoui).length)setTimeout(()=>setEcran("défaite"),1200);else{setBesoinÉch(true);setVoirÉch(true);setPhase("switch");}}
    else setPhase("choisir");
  }

  function utiliser(obj,ti){
    const éq=cop(equipe);const pk=éq[ti];
    const ic=[...sac];const ri=ic.findIndex(i=>i.id===obj.id);if(ri!==-1)ic.splice(ri,1);
    const logs=[];
    if(obj.heal){const h=Math.min(obj.heal,pk.pvMax-pk.pv);pk.pv=Math.min(pk.pvMax,pk.pv+obj.heal);logs.push(obj.nom+" → +"+h+" PV à "+pk.nom);}
    if(obj.healFull){pk.pv=pk.pvMax;if(obj.cure){pk.status=null;pk.statusCnt=0;}logs.push(obj.nom+" utilisé sur "+pk.nom+" !");}
    if(obj.cureAll){pk.status=null;pk.statusCnt=0;logs.push(pk.nom+" est soigné !");}
    if(obj.cureStatus){if(pk.status===obj.cureStatus||(obj.cureStatus==="psn"&&pk.status==="bpsn")){pk.status=null;pk.statusCnt=0;logs.push("Statut de "+pk.nom+" soigné !");}}
    if(obj.revive&&pk.evanoui){pk.pv=0|pk.pvMax/2;pk.evanoui=false;logs.push(pk.nom+" se relève ! ("+pk.pv+" PV)");}
    if(obj.maxRevive&&pk.evanoui){pk.pv=pk.pvMax;pk.evanoui=false;logs.push(pk.nom+" se relève complètement !");}
    if(obj.maxElixir){pk.caps.forEach(c=>{c.pp=c.maxPp;});logs.push("Tous les PP de "+pk.nom+" restaurés !");}
    if(obj.elixir){pk.caps.forEach(c=>{c.pp=Math.min(c.maxPp,(c.pp||0)+obj.elixir);});logs.push("PP de "+pk.nom+" restaurés (+"+obj.elixir+") !");}
    if(obj.boost)Object.entries(obj.boost).forEach(([s,v])=>{pk.boost[s]=(pk.boost[s]||0)+v;logs.push(pk.nom+" : "+s+" monte !");});
    if(obj.held){pk.tenu=obj.held;logs.push(pk.nom+" tient : "+obj.nom+" !");}
    éq[ti]=pk;setEquipe(éq);setSac(ic);setJournal(prev=>[...prev,...logs]);setVoirSac(false);
    if(ecran==="combat"&&phase==="choisir"){
      setPhase("occupé");const e=cop(foe);const jou=éq[idx];
      const em=iaMove(e,jou);const el=[];
      const sr=vStat(e,true);el.push(...sr.logs);if(sr.ok)el.push(...exeCap(e,jou,em,true));
      el.push(...eot(jou,false));el.push(...eot(e,true));
      if(jou.pv<=0){jou.evanoui=true;el.push("Votre "+jou.nom+" est K.O. !");}
      if(e.pv<=0)el.push(e.nom+" est K.O. !");
      éq[idx]=jou;setEquipe(éq);setFoe(e);setJournal(prev=>[...prev,...el]);
      if(e.pv<=0){setJournal(prev=>[...prev,"🏆 Victoire !"]);setTimeout(()=>aprèsVictoire(éq,nœud),1400);}
      else if(jou.pv<=0){if(!éq.filter(p=>!p.evanoui).length)setTimeout(()=>setEcran("défaite"),1200);else{setBesoinÉch(true);setVoirÉch(true);setPhase("switch");}}
      else setPhase("choisir");
    }
  }

    const joueur=equipe[idx];const vivants=equipe.filter(p=>!p.evanoui);
    const nd=nœud?NOEUDS.find(n=>n.id===nœud):null;
    const estGym=nd&&(nd.type==="arene"||nd.type==="champion");
    return(
      <div style={{display:"flex",width:"100%",maxWidth:960,minHeight:"100vh"}}>
        <PanGauche/>
        <div style={{flex:1,display:"flex",flexDirection:"column",background:gbkg,padding:"10px 8px 16px",gap:6}}>
          {/* Zone combat */}
          <div style={{...CRD({flexShrink:0,position:"relative",overflow:"hidden"}),paddingBottom:8}}>
            {estGym&&<div style={{position:"absolute",top:0,left:0,right:0,height:2,background:"linear-gradient(90deg,"+gc+","+gc2+")"}}/>}
            {/* Ennemi - ligne du haut */}
            {foe&&<div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginTop:estGym?8:4}}>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:4}}>
                  <div style={{fontSize:10,color:estGym?gc:"#e0d8f8",textTransform:"capitalize",fontWeight:700}}>{foe.nom}</div>
                  <Sta status={foe.status}/>
                </div>
                <div style={{display:"flex",gap:3,marginBottom:6,flexWrap:"wrap"}}>{foe.types.map(t=><Typ key={t} t={t}/>)}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <div style={{fontSize:7,color:"#505068"}}>Niv.{foe.lv} — {foe.pv}/{foe.pvMax} PV</div>
                </div>
                <div style={{width:"100%",maxWidth:220}}><BarrePV cur={foe.pv} max={foe.pvMax} lg={true}/></div>
              </div>
              {/* Artwork officiel de l'ennemi */}
              <div style={{flexShrink:0,marginLeft:8}}>
                <img src={foe.art||foe.spr} alt={foe.nom} style={{width:110,height:110,objectFit:"contain",filter:estGym?"drop-shadow(0 0 8px "+gc+"88)":"none"}}/>
              </div>
            </div>}
          </div>

          {/* Journal de combat */}
          <div ref={jRef} style={{...CRD({height:80,overflowY:"auto",fontSize:7,color:"#90d048",lineHeight:2.1,fontFamily:"'Courier New',monospace"})}}>
            {journal.slice(-25).map((l,i)=><div key={i} style={{borderBottom:"1px solid rgba(255,255,255,.04)",padding:"0 2px"}}>{l}</div>)}
          </div>

          {/* Joueur - ligne du bas */}
          {joueur&&<div style={CRD({flexShrink:0})}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:6}}>
              {/* Back sprite du joueur (plus grand) */}
              <div style={{flexShrink:0,marginRight:8}}>
                <img src={joueur.back||joueur.spr} alt={joueur.nom} style={{width:90,height:90,objectFit:"contain"}}/>
              </div>
              <div style={{flex:1}}>
                <div style={{display:"flex",gap:5,alignItems:"center",marginBottom:3}}>
                  <div style={{fontSize:9,color:gc,textTransform:"capitalize"}}>{joueur.nom}</div>
                  <Sta status={joueur.status}/>
                </div>
                <div style={{display:"flex",gap:3,marginBottom:4,flexWrap:"wrap"}}>{joueur.types.map(t=><Typ key={t} t={t}/>)}</div>
                {joueur.tenu&&<div style={{fontSize:6,color:"#4848a0",marginBottom:3}}>📦 {joueur.tenu}</div>}
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                  <div style={{fontSize:7,color:"#505068"}}>Niv.{joueur.lv}</div>
                  <div style={{fontSize:7,color:"#505068"}}>{joueur.pv}/{joueur.pvMax} PV</div>
                </div>
                <BarrePV cur={joueur.pv} max={joueur.pvMax} lg={true}/>
              </div>
            </div>
          </div>}

          {/* Capacités */}
          {!voirSac&&!voirÉch&&joueur&&phase==="choisir"&&(
            <div style={{flexShrink:0}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:6,marginBottom:6}}>
                {joueur.caps.map((c,i)=>(
                  <button key={i} onClick={()=>choisirCap(i)} disabled={c.pp<=0}
                    style={{background:c.pp>0?(TCOL[c.t]||"#555")+"18":"#080810",border:"1px solid "+(c.pp>0?(TCOL[c.t]||"#555"):"#181828"),borderRadius:6,padding:"9px 10px",cursor:c.pp>0?"pointer":"not-allowed",color:c.pp>0?"#e8e0d8":"#282838",display:"flex",justifyContent:"space-between",alignItems:"center",fontFamily:"'Press Start 2P',monospace",transition:"background .1s"}}
                    onMouseEnter={e=>{if(c.pp>0)e.currentTarget.style.background=(TCOL[c.t]||"#555")+"30";}}
                    onMouseLeave={e=>{e.currentTarget.style.background=c.pp>0?(TCOL[c.t]||"#555")+"18":"#080810";}}>
                    <div>
                      <div style={{fontSize:8,fontWeight:700,marginBottom:3}}>{nomCap(c.nom)}</div>
                      <div style={{display:"flex",gap:4,alignItems:"center"}}><Typ t={c.t}/><span style={{fontSize:6,color:"#808098"}}>{c.p?c.p+"⚡":"—"} {c.dc==="phy"?"⚔":"✨"}</span></div>
                    </div>
                    <div style={{fontSize:6,color:c.pp<=c.maxPp*.3?"#e84040":"#606080",textAlign:"right",lineHeight:1.5}}>{c.pp}<br/><span style={{color:"#303050"}}>/{c.maxPp}</span></div>
                  </button>
                ))}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={()=>setVoirSac(true)} style={{...BTN(gc),flex:1}}>🎒 SAC ({sac.length})</button>
                <button onClick={()=>setVoirÉch(true)} disabled={vivants.length<=1} style={{...BTN(gc2),flex:1,opacity:vivants.length<=1?.35:1}}>⇄ ÉCHANGE</button>
              </div>
            </div>
          )}
          {!voirSac&&!voirÉch&&phase==="occupé"&&<div style={{color:"#202038",fontSize:8,padding:10,textAlign:"center"}}>⏳</div>}

          {/* Sac */}
          {voirSac&&<div style={{...CRD({maxHeight:300,overflowY:"auto",flexShrink:0})}}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontSize:9,color:gc}}>🎒 SAC</span>
              <button onClick={()=>setVoirSac(false)} style={{background:"none",border:"none",color:"#404060",fontSize:14,cursor:"pointer"}}>✕</button>
            </div>
            {!sac.length&&<div style={{fontSize:7,color:"#303050",textAlign:"center",padding:12}}>Sac vide !</div>}
            {Object.entries(sac.reduce((a,i)=>{a[i.id]=a[i.id]||{obj:i,n:0};a[i.id].n++;return a;},{})).map(([id,{obj,n}])=>(
              <div key={id} style={{marginBottom:8,background:"rgba(255,255,255,.03)",borderRadius:5,padding:6}}>
                <div style={{fontSize:7,color:"#b0a8d0",marginBottom:4}}>{obj.e} {obj.nom} ×{n} <span style={{fontSize:6,color:"#404060"}}>— {obj.desc}</span></div>
                {(obj.maxRevive||obj.revive)?equipe.filter(p=>p.evanoui).map(p=>{const ti=equipe.findIndex(t=>t.id===p.id);return(
                  <button key={ti} onClick={()=>utiliser(obj,ti)} style={{...BTN(gc2),display:"block",width:"100%",marginBottom:3,padding:"5px 8px",textTransform:"capitalize",textAlign:"left",fontSize:7}}>Sur {p.nom} (K.O.)</button>
                );}):!obj.held?equipe.filter(p=>!p.evanoui).map(p=>{const ti=equipe.findIndex(t=>t.id===p.id);return(
                  <button key={ti} onClick={()=>utiliser(obj,ti)} style={{...BTN(gc),display:"block",width:"100%",marginBottom:3,padding:"5px 8px",textTransform:"capitalize",textAlign:"left",fontSize:7}}>Sur {p.nom}</button>
                );}):equipe.filter(p=>!p.evanoui&&!p.tenu).map(p=>{const ti=equipe.findIndex(t=>t.id===p.id);return(
                  <button key={ti} onClick={()=>utiliser(obj,ti)} style={{...BTN(gc2),display:"block",width:"100%",marginBottom:3,padding:"5px 8px",textTransform:"capitalize",textAlign:"left",fontSize:7}}>Donner à {p.nom}</button>
                );})}
              </div>
            ))}
          </div>}

          {/* Échange */}
          {voirÉch&&<div style={CRD({flexShrink:0})}>
            <div style={{display:"flex",justifyContent:"space-between",marginBottom:10}}>
              <span style={{fontSize:8,color:gc}}>{besoinÉch?"QUI COMBAT ?":"ÉCHANGE"}</span>
              {!besoinÉch&&<button onClick={()=>setVoirÉch(false)} style={{background:"none",border:"none",color:"#404060",fontSize:14,cursor:"pointer"}}>✕</button>}
            </div>
            {equipe.map((p,i)=>(
              <button key={i} onClick={()=>!p.evanoui&&i!==idx&&échanger(i)} disabled={p.evanoui||i===idx}
                style={{display:"flex",alignItems:"center",gap:8,width:"100%",padding:"6px 8px",marginBottom:5,background:i===idx?"rgba(255,255,255,.05)":p.evanoui?"rgba(0,0,0,.3)":"rgba(255,255,255,.02)",border:"1px solid "+(i===idx?gc:p.evanoui?"#181828":"#20203a"),borderRadius:5,color:p.evanoui?"#282838":"#c0b8d8",cursor:p.evanoui||i===idx?"not-allowed":"pointer",opacity:p.evanoui?.3:1,fontFamily:"'Press Start 2P',monospace"}}>
                <img src={p.spr} alt="" style={{width:32,height:32,filter:p.evanoui?"grayscale(1)":"none"}}/>
                <div style={{flex:1,textAlign:"left"}}>
                  <div style={{fontSize:7,textTransform:"capitalize",color:i===idx?gc:"#c0b8d8"}}>{p.nom}</div>
                  <div style={{fontSize:5,color:"#404060"}}>{p.pv}/{p.pvMax} PV {p.evanoui?"(K.O.)":i===idx?"(En combat)":""}</div>
                </div>
                <div style={{width:60}}><BarrePV cur={p.pv} max={p.pvMax}/></div>
              </button>
            ))}
          </div>}
        </div>
        <PanDroit/>
      </div>
    );
  }

  function ResetBtn(){return(
    <button onClick={()=>{setEcran("genSelect");setGen(null);setEquipe([]);setIdx(0);setSac([]);setBadges(0);setEffacés(new Set(["dep"]));setDispos(["ra1","ra2"]);setPos("dep");setEnnemis({});setRévélés({});setNœud(null);setMsgCarte("");setPct(0);tousP.current={};réserve.current={};gymsP.current={};}}
      style={{marginTop:16,padding:"10px 28px",background:"transparent",border:"2px solid "+gc,borderRadius:5,color:gc,fontFamily:"'Press Start 2P',monospace",fontSize:9,cursor:"pointer"}}>REJOUER</button>
  );}

  if(ecran==="défaite")return(
    <div style={{minHeight:"100vh",background:gbkg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{...CRD({maxWidth:400,textAlign:"center"})}}>
        <div style={{fontSize:44,marginBottom:10}}>💀</div>
        <div style={{fontSize:11,color:"#e84848",marginBottom:8,letterSpacing:2}}>DÉFAITE</div>
        <div style={{fontSize:7,color:"#404060",marginBottom:16}}>{effacés.size-1}/12 zones • {badges}/5 badges</div>
        {equipe.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
            <img src={p.spr} alt="" style={{width:32,height:32,opacity:p.evanoui?.3:1}}/>
            <span style={{fontSize:7,textTransform:"capitalize",color:p.evanoui?"#282838":"#c0c0d8",flex:1,textAlign:"left"}}>{p.nom}</span>
            {p.evanoui?<span style={{fontSize:6,color:"#803030"}}>K.O.</span>:<span style={{fontSize:6,color:"#308030"}}>{p.pv}/{p.pvMax}</span>}
          </div>
        ))}
        <ResetBtn/>
      </div>
    </div>
  );

  if(ecran==="victoire")return(
    <div style={{minHeight:"100vh",background:gbkg,display:"flex",alignItems:"center",justifyContent:"center"}}>
      <div style={{...CRD({maxWidth:440,textAlign:"center"}),border:"1px solid "+gc}}>
        <div style={{height:3,background:"linear-gradient(90deg,"+gc+","+gc2+")",marginBottom:16,borderRadius:2}}/>
        <div style={{fontSize:44,marginBottom:10}}>🏆</div>
        <div style={{fontSize:11,color:gc,marginBottom:6,letterSpacing:2}}>CHAMPION !</div>
        <div style={{fontSize:8,color:gc2,marginBottom:4}}>{gd?.reg} conquise ! {badges}/5 badges</div>
        <div style={{fontSize:7,color:"#383858",marginBottom:16}}>Félicitations, vous êtes le nouveau Champion !</div>
        {equipe.map((p,i)=>(
          <div key={i} style={{display:"flex",alignItems:"center",gap:8,padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,.05)"}}>
            <img src={p.art||p.spr} alt="" style={{width:40,height:40,objectFit:"contain"}}/>
            <span style={{fontSize:7,textTransform:"capitalize",flex:1,textAlign:"left"}}>{p.nom}</span>
            {p.tenu&&<span style={{fontSize:6,color:gc2}}>📦 {p.tenu}</span>}
          </div>
        ))}
        <ResetBtn/>
      </div>
    </div>
  );

  return null;
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script></body></html>
